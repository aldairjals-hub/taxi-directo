<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Directo — Gestión de Flota</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.3.0/dist/exceljs.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--blue:#1A56DB;--blue-dark:#1240A8;--blue-light:#EBF2FF;--gray-50:#F8FAFC;--gray-100:#F1F5F9;--gray-200:#E2E8F0;--gray-400:#94A3B8;--gray-600:#475569;--gray-800:#1E293B;--green:#0F6E56;--green-bg:#E1F5EE;--red:#B91C1C;--red-bg:#FEE2E2;--amber:#92400E;--amber-bg:#FEF3C7}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--gray-50);color:var(--gray-800)}
#login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--blue-dark),var(--blue))}
.login-card{background:#fff;border-radius:16px;padding:40px;width:400px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.logo-mark{width:44px;height:44px;border-radius:10px;background:var(--blue);display:flex;align-items:center;justify-content:center}
.logo-mark span{color:#fff;font-size:16px;font-weight:700}
.login-title{font-size:22px;font-weight:700}
.login-sub{font-size:13px;color:var(--gray-400);text-align:center}
.form-group{margin-bottom:16px}
.form-label{font-size:11px;font-weight:700;color:var(--gray-600);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:6px}
.form-input{width:100%;padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:13px;font-family:inherit;transition:border-color .15s}
.form-input:focus{outline:none;border-color:var(--blue)}
.btn-login{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px}
.btn-login:hover{background:var(--blue-dark)}
.login-error{background:var(--red-bg);color:var(--red);padding:10px 14px;border-radius:8px;font-size:12px;margin-top:12px;border:1px solid #FECACA;display:none}
#app{display:none;flex-direction:column;height:100vh}
.header{background:var(--blue-dark);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-logo{display:flex;align-items:center;gap:10px}
.header-logo-mark{width:28px;height:28px;border-radius:6px;background:#fff;display:flex;align-items:center;justify-content:center}
.header-logo-mark span{font-size:11px;font-weight:700;color:var(--blue-dark)}
.header-title{font-size:14px;font-weight:700;color:#fff}
.header-right{display:flex;align-items:center;gap:10px}
.header-user{font-size:12px;color:rgba(255,255,255,.7)}
.header-role{font-size:10px;color:rgba(255,255,255,.5);background:rgba(255,255,255,.1);padding:2px 8px;border-radius:20px}
.btn-logout{background:rgba(255,255,255,.15);color:#fff;border:none;padding:5px 11px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit}
.nav{background:#fff;border-bottom:1.5px solid var(--gray-200);padding:0 20px;display:flex;gap:2px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-item{padding:11px 14px;font-size:12px;font-weight:500;color:var(--gray-400);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:all .15s;flex-shrink:0}
.nav-item:hover{color:var(--gray-800)}
.nav-item.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
.nav-badge{font-size:9px;padding:1px 5px;border-radius:20px;background:#EF4444;color:#fff;font-weight:700}
.content{flex:1;overflow-y:auto;padding:20px 24px}
.card{background:#fff;border:1.5px solid var(--gray-200);border-radius:11px;padding:16px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:700;color:var(--gray-800);margin-bottom:12px}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.metric-card{background:#fff;border:1.5px solid var(--gray-200);border-radius:11px;padding:14px 16px}
.metric-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:9px;font-size:17px}
.ic-blue{background:var(--blue-light);color:var(--blue)}
.ic-green{background:var(--green-bg);color:var(--green)}
.ic-red{background:var(--red-bg);color:var(--red)}
.ic-amber{background:var(--amber-bg);color:var(--amber)}
.metric-val{font-size:22px;font-weight:700;margin-bottom:2px}
.metric-lbl{font-size:11px;color:var(--gray-400)}
.metric-sub{font-size:10px;color:var(--gray-400);margin-top:2px}
.badge{display:inline-flex;align-items:center;gap:2px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600}
.badge-ok{background:var(--green-bg);color:var(--green)}
.badge-warn{background:var(--amber-bg);color:var(--amber)}
.badge-danger{background:var(--red-bg);color:var(--red)}
.badge-info{background:var(--blue-light);color:var(--blue)}
.badge-gray{background:var(--gray-100);color:var(--gray-600)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 9px;font-size:9px;font-weight:700;color:var(--gray-400);border-bottom:1.5px solid var(--gray-200);text-transform:uppercase;letter-spacing:.05em}
td{padding:9px 9px;border-bottom:1px solid var(--gray-100);color:var(--gray-800);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gray-50)}
.btn{padding:7px 13px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-800);display:inline-flex;align-items:center;gap:5px;font-family:inherit;transition:all .15s}
.btn:hover{background:var(--gray-100)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:var(--blue-dark)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:#FECACA}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-label2{font-size:10px;font-weight:700;color:var(--gray-600);text-transform:uppercase;letter-spacing:.04em}
input[type=text],input[type=email],input[type=date],input[type=file],input[type=number],select,textarea{padding:8px 11px;border-radius:7px;border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-800);font-size:12px;width:100%;font-family:inherit;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue)}
.alert{border-radius:9px;padding:11px 13px;margin-bottom:12px;border:1.5px solid}
.alert-success{background:var(--green-bg);border-color:#6EE7B7}
.alert-success .at{color:var(--green);font-size:12px;font-weight:700}
.alert-info{background:var(--blue-light);border-color:#BFDBFE}
.alert-info .at{color:var(--blue-dark);font-size:12px;font-weight:700}
.alert-warn{background:var(--amber-bg);border-color:#FCD34D}
.alert-warn .at{color:var(--amber);font-size:12px;font-weight:700}
.alert-danger{background:var(--red-bg);border-color:#FCA5A5}
.alert-danger .at{color:var(--red);font-size:12px;font-weight:700}
.search-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border:1.5px solid var(--gray-200);border-radius:10px;margin-bottom:14px}
.search-bar i{color:var(--gray-400);font-size:18px;flex-shrink:0}
.search-bar input{border:none;background:transparent;font-size:13px;flex:1;font-family:inherit;outline:none}
.search-count{font-size:11px;color:var(--gray-400);padding:2px 8px;background:var(--gray-100);border-radius:20px;white-space:nowrap}
.loader{text-align:center;padding:40px;color:var(--gray-400);font-size:13px}
.progress-bg{height:8px;background:var(--gray-100);border-radius:4px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:4px;transition:width .4s}
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal-box{background:#fff;border-radius:13px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;padding:20px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:14px;font-weight:700}
@media(max-width:768px){.metrics-grid{grid-template-columns:1fr 1fr}.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-mark"><span>TD</span></div>
      <div><div class="login-title">Taxi Directo</div><div class="login-sub">Sistema de Gestión de Flota</div></div>
    </div>
    <div class="form-group">
      <label class="form-label">Correo electrónico</label>
      <input type="email" id="login-email" class="form-input" placeholder="tu@directoapp.pe">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input type="password" id="login-password" class="form-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" onclick="doLogin()"><i class="ti ti-login"></i> Ingresar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-logo">
      <div class="header-logo-mark"><span>TD</span></div>
      <div class="header-title">Taxi Directo</div>
    </div>
    <div class="header-right">
      <span class="header-user" id="user-name"></span>
      <span class="header-role" id="user-role"></span>
      <button class="btn-logout" onclick="doLogout()"><i class="ti ti-logout"></i> Salir</button>
    </div>
  </div>
  <div class="nav" id="nav-tabs"></div>
  <div class="content" id="main-content"><div class="loader"><i class="ti ti-loader" style="animation:spin 1s linear infinite;display:inline-block"></i> Cargando...</div></div>
</div>

<style>@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style>
<script>
// --- CONFIG -------------------------------
const SB_URL = 'https://rvqyeqxbbjqmezwpfmug.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2cXllcXhiYmpxbWV6d3BmbXVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NzUzODAsImV4cCI6MjA5NTA1MTM4MH0.Zvt9dPqFzOQ40mX_hFeR2Ph00FR9zASx1-B0VVkpVJU';
const sb = supabase.createClient(SB_URL, SB_KEY);

let CU = null; // currentUser
let CP = null; // currentPerfil

// --- AUTH ---------------------------------
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  const err = document.getElementById('login-error');
  err.style.display = 'none';
  if (!email || !pass) { showLoginError('Completa email y contraseña'); return; }
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { showLoginError('Email o contraseña incorrectos'); return; }
  await startApp(data.user);
}

function showLoginError(msg) {
  const e = document.getElementById('login-error');
  e.textContent = msg; e.style.display = 'block';
}

async function doLogout() {
  await sb.auth.signOut();
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
}

async function startApp(user) {
  CU = user;
  CP = null;
  try {
    const { data: perfil } = await sb.from('usuarios').select('*').eq('id', user.id).single();
    CP = perfil;
  } catch(e) {
    console.warn('No se pudo cargar perfil:', e.message);
  }
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-name').textContent = CP?.nombre || user.email;
  document.getElementById('user-role').textContent = CP?.rol || 'usuario';
  buildNav(CP?.rol || 'inspector');
  loadTab('dashboard');
}

// --- NAV ----------------------------------
const NAV_ADMIN = [
  {id:'dashboard',label:'Dashboard',icon:'ti-layout-dashboard'},
  {id:'inspeccion',label:'Nueva inspección',icon:'ti-clipboard-check'},
  {id:'buscar',label:'Buscar conductor',icon:'ti-search'},
  {id:'bloqueos',label:'Bloqueos',icon:'ti-lock',badge:true},
  {id:'compromisos',label:'Compromisos',icon:'ti-alert-triangle',badge:true},
  {id:'incidencias',label:'Incidencias',icon:'ti-exclamation-circle'},
  {id:'activos',label:'Activos + SLA',icon:'ti-package'},
  {id:'constructor',label:'Constructor form.',icon:'ti-forms'},
  {id:'reportes',label:'Reportes',icon:'ti-chart-bar'},
  {id:'padron',label:'Gestión padrón',icon:'ti-upload'},
  {id:'usuarios',label:'Usuarios',icon:'ti-users'},
];
const NAV_INSPECTOR = [
  {id:'dashboard',label:'Dashboard',icon:'ti-layout-dashboard'},
  {id:'inspeccion',label:'Nueva inspección',icon:'ti-clipboard-check'},
  {id:'buscar',label:'Buscar conductor',icon:'ti-search'},
  {id:'bloqueos',label:'Bloqueos',icon:'ti-lock',badge:true},
  {id:'activos',label:'Activos',icon:'ti-package'},
];
const NAV_EJECUTIVO = [
  {id:'dashboard',label:'Dashboard',icon:'ti-layout-dashboard'},
  {id:'inspeccion',label:'Inspección',icon:'ti-clipboard-check'},
  {id:'buscar',label:'Buscar conductor',icon:'ti-search'},
  {id:'compromisos',label:'Compromisos',icon:'ti-alert-triangle'},
  {id:'incidencias',label:'Incidencias',icon:'ti-exclamation-circle'},
];

function buildNav(rol) {
  const tabs = rol==='admin'?NAV_ADMIN:rol==='ejecutivo'?NAV_EJECUTIVO:NAV_INSPECTOR;
  document.getElementById('nav-tabs').innerHTML = tabs.map(t =>
    '<div class="nav-item" id="nav-'+t.id+'" onclick="loadTab(\''+t.id+'\')">' +
    '<i class="ti '+t.icon+'"></i>'+t.label+
    (t.badge?'<span class="nav-badge" id="badge-'+t.id+'">0</span>':'')+
    '</div>'
  ).join('');
}

async function loadTab(tab) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const el = document.getElementById('nav-'+tab);
  if (el) el.classList.add('active');
  const mc = document.getElementById('main-content');
  mc.innerHTML = '<div class="loader"><i class="ti ti-loader" style="animation:spin 1s linear infinite;display:inline-block"></i> Cargando...</div>';
  const fns = {
    dashboard: renderDashboard,
    inspeccion: renderInspeccion,
    buscar: renderBuscar,
    bloqueos: renderBloqueos,
    compromisos: renderCompromisos,
    incidencias: renderIncidencias,
    activos: renderActivos,
    constructor: renderConstructor,
    reportes: renderReportes,
    padron: renderPadron,
    usuarios: renderUsuarios,
  };
  if (fns[tab]) await fns[tab]();
}

// --- HELPERS ------------------------------
function h(tag, attrs, inner) {
  const a = Object.entries(attrs||{}).map(([k,v])=>k+'="'+v+'"').join(' ');
  return '<'+tag+(a?' '+a:'')+'>'+( inner||'')+'</'+tag+'>';
}
function badge(txt, cls) { return '<span class="badge badge-'+cls+'">'+txt+'</span>'; }
function btn(txt, cls, onclick) { return '<button class="btn '+cls+'" onclick="'+onclick+'">'+txt+'</button>'; }
function openModal(id, title, bodyHtml, onSave) {
  const existing = document.getElementById('td-modal');
  if (existing) existing.remove();
  const m = document.createElement('div');
  m.id = 'td-modal';
  m.className = 'modal-overlay';
  m.onclick = function(e) { if(e.target===m) m.remove(); };
  m.innerHTML =
    '<div class="modal-box">' +
      '<div class="modal-header">' +
        '<div class="modal-title">'+title+'</div>' +
        '<button class="btn btn-sm" onclick="document.getElementById(\'td-modal\').remove()">✕</button>' +
      '</div>' +
      bodyHtml +
    '</div>';
  document.body.appendChild(m);
}
function closeModal() {
  const m = document.getElementById('td-modal');
  if (m) m.remove();
}

// --- DASHBOARD ----------------------------
async function renderDashboard() {
  const mes = new Date().toISOString().slice(0,7);
  const [r1,r2,r3,r4] = await Promise.all([
    sb.from('conductores').select('*',{count:'exact',head:true}).neq('estado','desactivado'),
    sb.from('inspecciones').select('*',{count:'exact',head:true}).eq('mes_referencia',mes),
    sb.from('bloqueos').select('*',{count:'exact',head:true}).eq('confirmado',true).eq('subsanado',false),
    sb.from('incidencias').select('*',{count:'exact',head:true}).eq('estado','abierta'),
  ]);
  const total = r1.count||0, insp = r2.count||0;
  const pct = total ? Math.round(insp/total*100) : 0;
  const col = pct>=80?'var(--green)':pct>=50?'var(--amber)':'var(--red)';
  const mesLabel = new Date().toLocaleString('es-PE',{month:'long',year:'numeric'});

  document.getElementById('main-content').innerHTML =
    '<h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Dashboard — '+mesLabel.charAt(0).toUpperCase()+mesLabel.slice(1)+'</h2>' +
    '<div class="metrics-grid">' +
      '<div class="metric-card"><div class="metric-icon ic-blue"><i class="ti ti-clipboard-check"></i></div><div class="metric-val">'+insp+'</div><div class="metric-lbl">Inspecciones este mes</div><div class="metric-sub">de '+total+' en padrón</div></div>' +
      '<div class="metric-card"><div class="metric-icon ic-blue"><i class="ti ti-chart-pie"></i></div><div class="metric-val" style="color:'+col+'">'+pct+'%</div><div class="metric-lbl">Avance mensual</div><div class="metric-sub">'+(total-insp)+' pendientes</div></div>' +
      '<div class="metric-card"><div class="metric-icon ic-red"><i class="ti ti-lock"></i></div><div class="metric-val" style="color:var(--red)">'+(r3.count||0)+'</div><div class="metric-lbl">Bloqueados activos</div></div>' +
      '<div class="metric-card"><div class="metric-icon ic-amber"><i class="ti ti-exclamation-circle"></i></div><div class="metric-val">'+(r4.count||0)+'</div><div class="metric-lbl">Incidencias abiertas</div></div>' +
    '</div>' +
    '<div class="card"><div class="card-title">Avance general</div>' +
      '<div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px"><span>'+insp+' de '+total+' conductores</span><span style="font-weight:700;color:'+col+'">'+pct+'%</span></div>' +
      '<div class="progress-bg"><div class="progress-fill" style="width:'+pct+'%;background:'+col+'"></div></div>' +
    '</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">' +
      '<div class="card" style="margin-bottom:0"><div class="card-title">Desempeño por inspector</div><div id="dash-insp"><div class="loader" style="padding:20px"></div></div></div>' +
      '<div class="card" style="margin-bottom:0"><div class="card-title">Avance por flota</div><div id="dash-flota"><div class="loader" style="padding:20px"></div></div></div>' +
    '</div>';

  // Badges
  if(document.getElementById('badge-bloqueos')) document.getElementById('badge-bloqueos').textContent = r3.count||0;
  if(document.getElementById('badge-compromisos')) document.getElementById('badge-compromisos').textContent = r4.count||0;

  // Load inspector + flota breakdown
  loadDashBreakdown(mes, total);
}

async function loadDashBreakdown(mes, totalConds) {
  const {data:insp} = await sb.from('inspecciones').select('conductor_id,usuario_id,usuarios(nombre,flotas_asignadas)').eq('mes_referencia',mes);
  const {data:conds} = await sb.from('conductores').select('id,flotas(nombre)').neq('estado','desactivado');

  // By inspector con desglose por flota individual
  const byInsp = {};
  (insp||[]).forEach(i => {
    const nm = i.usuarios?.nombre||'—';
    const cond = (conds||[]).find(c=>c.id===i.conductor_id);
    const fl = cond?.flotas?.nombre||'Sin flota';
    if (!byInsp[nm]) byInsp[nm] = {count:0, porFlota:{}};
    byInsp[nm].count++;
    byInsp[nm].porFlota[fl] = (byInsp[nm].porFlota[fl]||0)+1;
  });
  const elI = document.getElementById('dash-insp');
  if (elI) {
    if (!Object.keys(byInsp).length) {
      elI.innerHTML = '<p style="color:var(--gray-400);font-size:12px;text-align:center;padding:16px">Sin inspecciones este mes</p>';
    } else {
      elI.innerHTML = Object.entries(byInsp).sort((a,b)=>b[1].count-a[1].count).map(([nm,d]) => {
        const pct = Math.round(d.count/Math.max((insp||[]).length,1)*100);
        const tags = Object.entries(d.porFlota).sort((a,b)=>b[1]-a[1]).map(([fl,cnt])=>
          '<span style="font-size:10px;padding:2px 7px;background:var(--blue-light);color:var(--blue);border-radius:20px;font-weight:600">'+fl+': '+cnt+'</span>'
        ).join(' ');
        return '<div style="margin-bottom:14px">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">' +
            '<div style="font-size:12px;font-weight:600">'+nm+'</div>' +
            '<span style="font-size:16px;font-weight:700;color:var(--blue)">'+d.count+'</span>' +
          '</div>' +
          '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px">'+tags+'</div>' +
          '<div class="progress-bg"><div class="progress-fill" style="width:'+pct+'%;background:var(--blue)"></div></div>' +
        '</div>';
      }).join('');
    }
  }

  // By flota
  const byFlota = {};
  const inspIds = new Set((insp||[]).map(i=>i.conductor_id));
  (conds||[]).forEach(c => {
    const fl = c.flotas?.nombre||'Sin flota';
    if (!byFlota[fl]) byFlota[fl] = {total:0,insp:0};
    byFlota[fl].total++;
    if (inspIds.has(c.id)) byFlota[fl].insp++;
  });
  const elF = document.getElementById('dash-flota');
  if (elF) {
    elF.innerHTML = Object.entries(byFlota).sort((a,b)=>b[1].total-a[1].total).map(([fl,d]) => {
      const pct = Math.round(d.insp/Math.max(d.total,1)*100);
      const col = pct>=80?'#22C55E':pct>=50?'#F59E0B':'#EF4444';
      return '<div style="margin-bottom:12px">' +
        '<div style="display:flex;justify-content:space-between;margin-bottom:3px">' +
          '<span style="font-size:12px;font-weight:600">'+fl+'</span>' +
          '<span style="font-size:11px;font-weight:700;color:'+col+'">'+d.insp+'/'+d.total+' · '+pct+'%</span>' +
        '</div>' +
        '<div class="progress-bg"><div class="progress-fill" style="width:'+pct+'%;background:'+col+'"></div></div>' +
      '</div>';
    }).join('');
  }
}
</script>
<script>
// --- INSPECCIÓN ---------------------------
let _inspCondId = null;
let _inspCondCat = null;
let _pendingLavado = null;
let _catAlerta = null;

async function renderInspeccion() {
  const {data:campos} = await sb.from('formulario_campos').select('*').eq('formulario','inspeccion').eq('activo',true).order('orden');
  document.getElementById('main-content').innerHTML =
    '<h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Nueva inspección</h2>' +
    '<div class="card" style="max-width:640px">' +
      '<div style="font-size:9px;font-weight:700;color:var(--gray-400);text-transform:uppercase;padding-bottom:8px;border-bottom:1.5px solid var(--gray-200);margin-bottom:12px">Paso 1 — Identificar conductor</div>' +
      '<div style="display:flex;gap:8px;margin-bottom:10px">' +
        '<input type="text" id="insp-cod" placeholder="Código del conductor (Ej: 205)" oninput="buscarCondInsp()" style="flex:1;min-width:200px;font-size:14px;padding:10px 14px">' +
        '<select id="insp-tipo">' +

          '<option value="subsanacion">Subsanación mes anterior</option>' +
        '</select>' +
      '</div>' +
      '<div id="insp-cond-result" style="display:none;background:var(--blue-light);border:1.5px solid #BFDBFE;border-radius:9px;padding:12px;margin-bottom:12px">' +
        '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">' +
          '<div><div style="font-size:9px;font-weight:700;color:var(--blue);text-transform:uppercase;margin-bottom:2px">Conductor</div><div style="font-size:13px;font-weight:600;color:var(--blue-dark)" id="ic-nm">—</div></div>' +
          '<div><div style="font-size:9px;font-weight:700;color:var(--blue);text-transform:uppercase;margin-bottom:2px">Vehículo · Placa</div><div style="font-size:13px;font-weight:600;color:var(--blue-dark)" id="ic-vh">—</div></div>' +
          '<div><div style="font-size:9px;font-weight:700;color:var(--blue);text-transform:uppercase;margin-bottom:2px">Flota · Categoría</div><div style="font-size:13px;font-weight:600;color:var(--blue-dark)" id="ic-fl">—</div></div>' +
        '</div>' +
      '</div>' +
      '<div id="insp-form" style="display:none">' +
        '<div style="font-size:9px;font-weight:700;color:var(--gray-400);text-transform:uppercase;padding-bottom:8px;border-bottom:1.5px solid var(--gray-200);margin-bottom:12px">Paso 2 — Inspector y fecha</div>' +
        '<div class="form-grid">' +
          '<div class="form-field"><label class="form-label2">Inspector</label>' +
            '<select id="insp-eval">' +
              '<option value="'+( CU?.id||'')+'">'+( CP?.nombre||'Yo')+'</option>' +
            '</select></div>' +
          '<div class="form-field"><label class="form-label2">Fecha</label>' +
            '<input type="date" id="insp-fecha" value="'+new Date().toISOString().slice(0,10)+'"></div>' +
        '</div>' +
        '<div style="font-size:9px;font-weight:700;color:var(--gray-400);text-transform:uppercase;padding-bottom:8px;border-bottom:1.5px solid var(--gray-200);margin-bottom:12px">Paso 3 — Evaluación</div>' +
        '<div id="insp-campos">'+buildCamposHtml(campos||[])+'</div>' +
        '<div style="font-size:9px;font-weight:700;color:var(--gray-400);text-transform:uppercase;padding-bottom:8px;border-bottom:1.5px solid var(--gray-200);margin-bottom:12px">Paso 4 — Activos a reponer</div>' +
        '<div id="insp-activos" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">'+buildActivosHtml()+'</div>' +

      '</div>' +
      '<div id="insp-ok" style="display:none">' +
        '<div class="alert alert-success"><div class="at"><i class="ti ti-circle-check"></i> Inspección registrada correctamente</div></div>' +
        '<div id="insp-score-box" style="margin-bottom:12px"></div>' +
        '<div id="insp-comp-prompt" style="padding:14px;background:#fff;border:1.5px solid var(--blue);border-radius:10px;margin-bottom:12px">' +
          '<div style="font-size:13px;font-weight:700;margin-bottom:10px">¿Desea registrar un compromiso vehicular para este conductor?</div>' +
          '<div style="display:flex;gap:8px">' +
            '<button class="btn btn-primary btn-sm" onclick="irACompromiso()"><i class="ti ti-check"></i> Sí, registrar compromiso</button>' +
            '<button class="btn btn-sm" onclick="document.getElementById(\'insp-comp-prompt\').style.display=\'none\'">No por ahora</button>' +
          '</div>' +
        '</div>' +
        '<button class="btn btn-primary btn-sm" onclick="loadTab(\'inspeccion\')"><i class="ti ti-plus"></i> Nueva inspección</button>' +
      '</div>' +
    '</div>';
}

function buildCamposHtml(campos) {
  if (!campos.length) return '<p style="color:var(--gray-400)">Sin campos. Ve al Constructor.</p>';
  let html = ''; let sec = '';
  const secColors = {'Vehículo':'#1A56DB','Interior':'#0F6E56','Implementos de seguridad':'#92400E','Iluminación':'#7C3AED','Vidrios y espejos':'#0369A1','Carrocería':'#B91C1C','Conductor':'#1A56DB','Documentos':'#475569','Categoría':'#D97706'};
  campos.forEach(f => {
    if (f.seccion !== sec) {
      sec = f.seccion;
      const col = secColors[sec]||'#1A56DB';
      html += '<div style="font-size:11px;font-weight:700;color:'+col+';text-transform:uppercase;margin:14px 0 8px;padding-bottom:4px;border-bottom:2px solid '+col+'33">'+sec+'</div>';
    }
    let inp = '';
    const dn = 'data-nombre="'+f.nombre.replace(/"/g,'&quot;')+'"';
    if (f.tipo === 'sino') {
      inp = '<div style="display:flex;gap:8px;margin-top:7px">' +
        '<label style="flex:1;display:flex;align-items:center;gap:6px;padding:8px;border:1.5px solid var(--gray-200);border-radius:7px;cursor:pointer;font-size:12px">' +
          '<input type="radio" name="c_'+f.id+'" value="si" '+dn+' style="accent-color:var(--green)"> ✓ Sí</label>' +
        '<label style="flex:1;display:flex;align-items:center;gap:6px;padding:8px;border:1.5px solid var(--gray-200);border-radius:7px;cursor:pointer;font-size:12px">' +
          '<input type="radio" name="c_'+f.id+'" value="no" '+dn+' style="accent-color:var(--red)"> ✗ No</label>' +
      '</div>';
    } else if (f.tipo === 'opciones') {
      const onChange = f.nombre.includes('lavado')?'onchange="checkLavado(this.value)"':f.nombre.includes('Categoría')?'onchange="checkCategoria(this.value)"':'';
      inp = '<select name="c_'+f.id+'" '+dn+' style="margin-top:7px" '+onChange+'><option value="">Seleccionar...</option>' +
        (f.opciones||[]).map(o=>'<option>'+o+'</option>').join('') + '</select>';
    } else if (f.tipo === 'multiopciones') {
      inp = '<div style="margin-top:7px;display:flex;flex-wrap:wrap;gap:6px">' +
        (f.opciones||[]).map(o =>
          '<label style="display:flex;align-items:center;gap:5px;padding:5px 10px;border:1.5px solid var(--gray-200);border-radius:20px;cursor:pointer;font-size:11px">' +
          '<input type="checkbox" name="c_'+f.id+'" value="'+o+'" '+dn+' style="accent-color:var(--blue)"> '+o+'</label>'
        ).join('') + '</div>';
    } else {
      inp = '<input type="text" name="c_'+f.id+'" '+dn+' placeholder="Respuesta..." style="margin-top:7px">';
    }
    html += '<div style="padding:9px 0;border-bottom:1px solid var(--gray-100)">' +
      '<div style="font-size:12px;font-weight:600">'+f.nombre+(f.obligatorio?'<span style="color:var(--red);margin-left:2px;font-size:10px">*</span>':'')+'</div>' +
      inp +
      '<details style="margin-top:5px"><summary style="font-size:10px;color:var(--blue);cursor:pointer;list-style:none">+ Comentario</summary>' +
        '<textarea rows="1" name="com_'+f.id+'" data-nombre="'+f.nombre.replace(/"/g,'&quot;')+'" placeholder="Observación del inspector..." style="margin-top:4px;font-size:11px"></textarea>' +
      '</details>' +
    '</div>';
  });
  return html;
}

function buildActivosHtml() {
  const activos = [{id:'corbata',nm:'Corbata',ic:'ti-tie',subs:null},{id:'fotocheck',nm:'Fotocheck',ic:'ti-id',subs:['Lanyard','Acrílico','Tarjeta PVC']},{id:'kit',nm:'Kit identificación',ic:'ti-badge',subs:['Cabecera','Credencial']},{id:'cargador',nm:'Cable cargador',ic:'ti-plug',subs:null},{id:'charging',nm:'Charging spot',ic:'ti-device-mobile-charging',subs:null}];
  return activos.map(a => {
    const subsHtml = a.subs ? '<div style="margin-top:6px;padding-left:8px;display:flex;flex-wrap:wrap;gap:5px">'+a.subs.map(s=>'<label style="display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer"><input type="checkbox" name="sub_'+a.id+'" value="'+s+'" style="accent-color:var(--blue)"> '+s+'</label>').join('')+'</div>' : '';
    return '<div style="border:1.5px solid var(--gray-200);border-radius:9px;padding:10px">' +
      '<label style="display:flex;align-items:center;gap:8px;cursor:pointer">' +
        '<input type="checkbox" name="activo" value="'+a.id+'" style="width:16px;height:16px;accent-color:var(--blue);flex-shrink:0">' +
        '<i class="ti '+a.ic+'" style="font-size:18px;color:var(--gray-400)"></i>' +
        '<div><div style="font-size:12px;font-weight:600">'+a.nm+'</div>' +
        (a.subs?'<div style="font-size:10px;color:var(--gray-400)">Selecciona subpartes</div>':'')+'</div>' +
      '</label>'+subsHtml+'</div>';
  }).join('');
}

async function buscarCondInsp() {
  const cod = document.getElementById('insp-cod').value.trim().toUpperCase();
  // Resetear siempre al escribir nuevo código
  _inspCondId = null; _inspCondCat = null;
  document.getElementById('insp-cond-result').style.display='none';
  document.getElementById('insp-form').style.display='none';
  if (cod.length < 2) return;
  const {data} = await sb.from('conductores').select('id,nombre,placa,vehiculo,categoria,flotas(nombre)').eq('codigo',cod).single();
  if (!data) return;
  _inspCondId = data.id;
  _inspCondCat = data.categoria;
  document.getElementById('ic-nm').textContent = data.nombre;
  document.getElementById('ic-vh').textContent = (data.vehiculo||'—')+(data.placa?' · '+data.placa:'');
  document.getElementById('ic-fl').textContent = (data.flotas?.nombre||'—')+(data.categoria?' · '+data.categoria:'');
  document.getElementById('insp-cond-result').style.display = 'block';
  document.getElementById('insp-form').style.display = 'block';
  document.getElementById('insp-ok').style.display = 'none';
}

function checkLavado(val) { _pendingLavado = val.includes('meses')||val.includes('mes') ? val : null; }
function checkCategoria(val) {
  const map = {'Lite':'lite','Comfort':'comfort','Comfort XL':'comfort_xl','XL':'xl','Van':'van'};
  const sugerida = map[val];
  _catAlerta = (sugerida && _inspCondCat && sugerida !== _inspCondCat) ? {sugerida, observada:val} : null;
}

async function guardarInsp() {
  if (!_inspCondId) { alert('Selecciona un conductor válido'); return; }
  const fecha = document.getElementById('insp-fecha').value;
  const tipo = document.getElementById('insp-tipo').value;
  const obs = document.getElementById('insp-obs').value;
  const mesRef = fecha.slice(0,7);
  // Collect campos - store by field name using data-nombre attribute
  const camposEval = {};
  document.querySelectorAll('[name^="c_"]').forEach(el => {
    const nombre = el.getAttribute('data-nombre') || el.name.replace('c_','');
    if (el.type==='radio' && el.checked) camposEval[nombre] = el.value;
    else if (el.type==='checkbox' && el.checked) { if(!camposEval[nombre]) camposEval[nombre]=[]; camposEval[nombre].push(el.value); }
    else if (el.tagName==='SELECT' && el.value) camposEval[nombre] = el.value;
    else if (el.tagName==='INPUT' && el.type==='text' && el.value) camposEval[nombre] = el.value;
  });
  document.querySelectorAll('[name^="com_"]').forEach(el => { 
    const nombre = el.getAttribute('data-nombre');
    if(el.value && nombre) camposEval['Comentario — '+nombre]=el.value; 
  });
  // Collect activos
  const activos = [];
  document.querySelectorAll('[name="activo"]:checked').forEach(el => {
    const subs = []; document.querySelectorAll('[name="sub_'+el.value+'"]:checked').forEach(s=>subs.push(s.value));
    activos.push({activo:el.value,subpartes:subs});
  });
  // Score
  const score = calcScore(camposEval);
  const {error} = await sb.from('inspecciones').insert({
    conductor_id:_inspCondId, usuario_id:CU.id, fecha, tipo, mes_referencia:mesRef,
    observacion_general:obs, activos_solicitados:activos, campos_evaluados:camposEval,
    score_experiencia:score, categoria_sugerida:_catAlerta?.sugerida||null, alerta_categoria:!!_catAlerta
  });
  if (error) { alert('Error: '+error.message); return; }
  // Register activos
  for (const a of activos) {
    await sb.from('solicitudes_activos').insert({conductor_id:_inspCondId,inspector_id:CU.id,activo:a.activo,subpartes:a.subpartes,origen:'inspeccion',sla_target_dias:3,fecha_paso1:fecha});
  }
  // Lavado compromiso
  if (_pendingLavado) {
    const dias = _pendingLavado.includes('1')?30:_pendingLavado.includes('2')?60:90;
    const fl = new Date(Date.now()+dias*864e5).toISOString().slice(0,10);
    await sb.from('compromisos').insert({conductor_id:_inspCondId,usuario_id:CU.id,titulo:'Lavado de salón — '+_pendingLavado,tipo_dano:'Interior',descripcion:'Inspector recomienda lavado de salón en '+_pendingLavado,fecha_limite:fl,estado:'pendiente',es_vehicular:true});
    _pendingLavado = null;
  }
  // Show result
  document.getElementById('insp-form').style.display = 'none';
  document.getElementById('insp-ok').style.display = 'block';
  const sc = document.getElementById('insp-score-box');
  if (sc) {
    const col = score>=80?'var(--green)':score>=60?'var(--amber)':'var(--red)';
    const lbl = score>=80?'Excelente':score>=60?'Regular':'Requiere atención';
    sc.innerHTML = '<div style="text-align:center;padding:14px;background:var(--gray-50);border-radius:10px;border:2px solid '+col+'33;margin-bottom:12px">' +
      '<div style="font-size:10px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Score experiencia a bordo</div>' +
      '<div style="font-size:36px;font-weight:700;color:'+col+'">'+score+'%</div>' +
      '<div style="font-size:12px;color:'+col+';font-weight:600">'+lbl+'</div>' +
      (_catAlerta?'<div style="font-size:11px;color:var(--amber);margin-top:8px;padding:5px 8px;background:var(--amber-bg);border-radius:6px">⚠ Inspector sugirió cambio de categoría a: '+_catAlerta.observada+'</div>':'') +
    '</div>';
  }
  _inspCondId = null; _catAlerta = null;
}

function calcScore(campos) {
  const g1 = ['climatización','interior','tapicería','cielo','piso','cinturones'];
  const g2 = ['trasera','izquierdo','derecho'];
  const g3 = ['delantera','lunas','botiquín','extintor','triángulo','uniforme','corbata'];
  const g4 = ['luz','bocina','emergencia','direccional','retroceso'];
  function scoreKey(k, v) {
    const val = Array.isArray(v)?v.join(' '):String(v||'').toLowerCase();
    if (val.includes('100%')||val.includes('perfecto')||val.includes('excelente')||val.includes('limpios')||val==='si') return 1;
    if (val.includes('50%')||val.includes('visible')||val.includes('sucio')) return 0.5;
    if (val.includes('inoperat')||val.includes('mal estado')||val.includes('abolladura')||val.includes('choque')||val==='no') return 0;
    return 0.7;
  }
  function groupScore(keys) {
    const pts = [];
    Object.entries(campos).forEach(([k,v]) => {
      if (keys.some(g => k.toLowerCase().includes(g))) pts.push(scoreKey(k,v));
    });
    return pts.length ? pts.reduce((a,b)=>a+b,0)/pts.length : 0.7;
  }
  const s = groupScore(g1)*0.45 + groupScore(g2)*0.25 + groupScore(g3)*0.20 + groupScore(g4)*0.10;
  return Math.min(100,Math.max(0,Math.round(s*100)));
}

function irACompromiso() {
  document.getElementById('insp-comp-prompt').style.display = 'none';
  loadTab('compromisos');
  setTimeout(() => abrirFormCompromiso(), 600);
}
</script>
<script>
// --- BUSCAR CONDUCTOR ---------------------
async function renderBuscar() {
  document.getElementById('main-content').innerHTML =
    '<h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Buscar conductor</h2>' +
    '<div class="card" style="max-width:620px">' +
      '<div class="search-bar"><i class="ti ti-search"></i><input type="text" id="bus-inp" placeholder="Código, placa o nombre..." oninput="buscarCond()"><span class="search-count" id="bus-cnt"></span></div>' +
      '<div id="bus-sugg"></div>' +
    '</div>' +
    '<div id="hist-panel" style="max-width:620px"></div>';
}

async function buscarCond() {
  const v = document.getElementById('bus-inp').value.trim();
  if (v.length < 2) { document.getElementById('bus-sugg').innerHTML=''; return; }
  const {data} = await sb.from('conductores').select('id,codigo,nombre,placa,vehiculo,estado,flotas(nombre)').or('codigo.ilike.%'+v+'%,nombre.ilike.%'+v+'%,placa.ilike.%'+v+'%').limit(6);
  document.getElementById('bus-cnt').textContent = (data?.length||0)+' resultados';
  document.getElementById('bus-sugg').innerHTML = data?.length ?
    '<div style="border:1.5px solid var(--gray-200);border-radius:9px;overflow:hidden">' +
    data.map(c =>
      '<div style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between" onmouseenter="this.style.background=\'var(--blue-light)\'" onmouseleave="this.style.background=\'#fff\'" onclick="verHistorial(\''+c.id+'\')">' +
        '<div><div style="font-size:13px;font-weight:600">'+c.nombre+'</div><div style="font-size:11px;color:var(--gray-400)">'+c.codigo+' · '+(c.placa||'—')+' · '+(c.flotas?.nombre||'—')+'</div></div>' +
        badge(c.estado,c.estado==='activo'?'ok':c.estado==='congelado'?'warn':'gray') +
      '</div>'
    ).join('') + '</div>' : '';
}

async function verHistorial(id) {
  document.getElementById('bus-sugg').innerHTML = '';
  const [{data:cond},{data:inspList},{data:incList},{data:compList}] = await Promise.all([
    sb.from('conductores').select('*,flotas(nombre)').eq('id',id).single(),
    sb.from('inspecciones').select('*,usuarios(nombre)').eq('conductor_id',id).order('fecha',{ascending:false}).limit(20),
    sb.from('incidencias').select('*').eq('conductor_id',id).order('fecha',{ascending:false}).limit(10),
    sb.from('compromisos').select('*').eq('conductor_id',id).order('fecha_limite',{ascending:false}).limit(10),
  ]);
  if (!cond) return;
  document.getElementById('bus-inp').value = cond.nombre;
  // Store for PDF
  window._inspList = inspList||[];
  const items = [
    ...(inspList||[]).map(i=>({tipo:'insp',id:i.id,label:'Inspección '+(i.tipo==='subsanacion'?'(Subsanación) ':'')+i.mes_referencia,detail:'Inspector: '+(i.usuarios?.nombre||'—')+' · Score: '+(i.score_experiencia||'—')+'%',fecha:i.fecha})),
    ...(incList||[]).map(i=>({tipo:'inc',label:'Incidencia: '+i.tipo,detail:i.descripcion,fecha:i.fecha})),
    ...(compList||[]).map(c=>({tipo:'comp',label:c.titulo,detail:'Plazo: '+(c.fecha_limite||'—'),fecha:c.created_at?.slice(0,10)})),
  ].sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));

  document.getElementById('hist-panel').innerHTML =
    '<div class="card">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">' +
        '<div><div style="font-size:16px;font-weight:700">'+cond.nombre+'</div><div style="font-size:11px;color:var(--gray-400);margin-top:2px">'+cond.codigo+' · '+(cond.placa||'—')+' · '+(cond.vehiculo||'—')+'</div></div>' +
        badge(cond.estado,cond.estado==='activo'?'ok':cond.estado==='congelado'?'warn':'gray') +
      '</div>' +
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:11px;background:var(--gray-50);border-radius:8px;margin-bottom:14px">' +
        '<div><div style="font-size:9px;font-weight:700;color:var(--gray-400);text-transform:uppercase">Flota</div><div style="font-size:12px;font-weight:600;margin-top:2px">'+(cond.flotas?.nombre||'—')+'</div></div>' +
        '<div><div style="font-size:9px;font-weight:700;color:var(--gray-400);text-transform:uppercase">Inspecciones</div><div style="font-size:12px;font-weight:600;margin-top:2px">'+(inspList?.length||0)+'</div></div>' +
        '<div><div style="font-size:9px;font-weight:700;color:var(--gray-400);text-transform:uppercase">Incidencias</div><div style="font-size:12px;font-weight:600;margin-top:2px">'+(incList?.length||0)+'</div></div>' +
      '</div>' +
      '<div style="font-size:12px;font-weight:700;margin-bottom:10px">Historial completo</div>' +
      (!items.length ? '<p style="color:var(--gray-400);text-align:center;padding:20px">Sin historial</p>' :
        items.map(it => {
          const icons = {insp:'ti-clipboard-check',inc:'ti-exclamation-circle',comp:'ti-alert-triangle'};
          const cols = {insp:'var(--blue)',inc:'var(--amber)',comp:'var(--red)'};
          const bgs = {insp:'var(--blue-light)',inc:'var(--amber-bg)',comp:'var(--red-bg)'};
          return '<div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-100)">' +
            '<div style="width:30px;height:30px;border-radius:50%;background:'+bgs[it.tipo]+';display:flex;align-items:center;justify-content:center;flex-shrink:0">' +
              '<i class="ti '+icons[it.tipo]+'" style="color:'+cols[it.tipo]+';font-size:13px"></i>' +
            '</div>' +
            '<div style="flex:1">' +
              '<div style="font-size:12px;font-weight:600">'+it.label+'</div>' +
              '<div style="font-size:11px;color:var(--gray-600)">'+it.detail+'</div>' +
              '<div style="font-size:10px;color:var(--gray-400);margin-top:2px">'+(it.fecha||'—')+'</div>' +
            '</div>' +
            (it.tipo==='insp' ?
              '<div style="display:flex;gap:5px;align-items:center">' +
                '<button class="btn btn-sm" onclick="verDetalleInsp(\''+it.id+'\')"><i class="ti ti-eye"></i> Ver</button>' +
                '<button class="btn btn-sm" onclick="generarPDF(\''+it.id+'\')"><i class="ti ti-file-description"></i> PDF</button>' +
              '</div>' : '') +
          '</div>';
        }).join('')
      ) +
    '</div>';
}

async function verDetalleInsp(inspId) {
  const {data:i} = await sb.from('inspecciones').select('*,usuarios(nombre),conductores(nombre,codigo,placa,vehiculo,flotas(nombre))').eq('id',inspId).single();
  if (!i) return;
  // Fetch field names to map UUIDs
  const {data:fieldDefs} = await sb.from('formulario_campos').select('id,nombre,seccion').eq('formulario','inspeccion');
  const fieldMap = {};
  (fieldDefs||[]).forEach(f => fieldMap[f.id] = {nombre:f.nombre,seccion:f.seccion});
  // Map UUID keys to field names
  const rawCampos = i.campos_evaluados||{};
  const campos = {};
  Object.entries(rawCampos).forEach(([k,v]) => {
    const def = fieldMap[k];
    const nombre = def ? def.nombre : k;
    campos[nombre] = v;
  });
  const activos = i.activos_solicitados||[];
  const score = i.score_experiencia;
  const col = score>=80?'var(--green)':score>=60?'var(--amber)':'var(--red)';
  const camposHtml = Object.entries(campos).filter(([k])=>!k.startsWith('com_')).map(([k,v]) =>
    '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--gray-100);font-size:12px">' +
      '<span style="color:var(--gray-600)">'+k+'</span>' +
      '<strong>'+(Array.isArray(v)?v.join(', '):v)+'</strong>' +
    '</div>'
  ).join('');
  openModal('detalle-insp', 'Inspección — '+i.fecha,
    '<div style="display:flex;align-items:center;justify-content:flex-end;margin-bottom:12px">' +
      '<button class="btn btn-sm btn-primary" onclick="generarPDF(\''+inspId+'\')"><i class="ti ti-file-description"></i> Descargar PDF</button>' +
    '</div>' +
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:11px;background:var(--gray-50);border-radius:8px;margin-bottom:14px">' +
      '<div><div style="font-size:9px;font-weight:700;color:var(--gray-400);text-transform:uppercase">Tipo</div><div style="font-size:12px;font-weight:600;margin-top:2px">'+(i.tipo==='subsanacion'?'Subsanación':'Mensual')+'</div></div>' +
      '<div><div style="font-size:9px;font-weight:700;color:var(--gray-400);text-transform:uppercase">Inspector</div><div style="font-size:12px;font-weight:600;margin-top:2px">'+(i.usuarios?.nombre||'—')+'</div></div>' +
      (score?'<div style="text-align:center"><div style="font-size:9px;font-weight:700;color:var(--gray-400);text-transform:uppercase">Score</div><div style="font-size:22px;font-weight:700;color:'+col+';margin-top:2px">'+score+'%</div></div>':'<div></div>') +
    '</div>' +
    (i.alerta_categoria?'<div class="alert alert-warn"><div class="at">⚠ Inspector sugirió cambio a categoría: '+i.categoria_sugerida+'</div></div>':'') +
    '<div style="font-size:11px;font-weight:700;color:var(--gray-600);text-transform:uppercase;margin-bottom:8px">Campos evaluados</div>' +
    (camposHtml||'<p style="color:var(--gray-400)">Sin campos</p>') +
    (activos.length?'<div style="font-size:11px;font-weight:700;color:var(--gray-600);text-transform:uppercase;margin:12px 0 8px">Activos solicitados</div>'+activos.map(a=>'<div style="color:var(--red);font-size:12px;padding:3px 0">• '+(a.activo||a)+(Array.isArray(a.subpartes)&&a.subpartes.length?' ('+a.subpartes.join(', ')+')':'')+'</div>').join(''):'') +
    (i.observacion_general?'<div style="margin-top:10px;padding:9px;background:var(--gray-50);border-radius:7px;font-size:11px"><strong>Observación:</strong> '+i.observacion_general+'</div>':'')
  );
}

  // Fetch field names
  const {data:fieldDefs} = await sb.from('formulario_campos').select('id,nombre,seccion').eq('formulario','inspeccion');

    '.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:#F8FAFC;padding:10px;border-radius:7px;margin-bottom:14px}' +
    '.lbl{font-size:9px;font-weight:700;color:#94A3B8;text-transform:uppercase;margin-bottom:2px}.val{font-size:12px;font-weight:600}' +
    'table{width:100%;border-collapse:collapse;font-size:11px}th{background:#F1F5F9;padding:6px 9px;text-align:left;font-size:9px;color:#94A3B8;text-transform:uppercase}' +
    'td{padding:6px 9px;border-bottom:1px solid #F1F5F9}.footer{border-top:1px solid #E2E8F0;padding-top:8px;font-size:9px;color:#94A3B8;display:flex;justify-content:space-between;margin-top:16px}' +
    '@media print{.no-print{display:none}}</style></head><body>' +
    '<div class="hdr"><div><h1>Taxi Directo</h1><div class="sub">Reporte de Inspección Vehicular</div></div>' +
    '<div style="text-align:right;font-size:11px;color:#94A3B8">Fecha: <strong style="color:#1E293B">'+i.fecha+'</strong><br>Tipo: <strong style="color:#1E293B">'+(i.tipo==='subsanacion'?'Subsanación':'Mensual')+'</strong></div></div>' +
    '<div class="grid">' +
      '<div><div class="lbl">Conductor</div><div class="val">'+(cond?.nombre||'—')+'</div></div>' +
      '<div><div class="lbl">Código · Placa</div><div class="val">'+(cond?.codigo||'—')+' · '+(cond?.placa||'—')+'</div></div>' +
      '<div><div class="lbl">Vehículo</div><div class="val">'+(cond?.vehiculo||'—')+'</div></div>' +
      '<div><div class="lbl">Flota</div><div class="val">'+(cond?.flotas?.nombre||'—')+'</div></div>' +
      '<div><div class="lbl">Inspector</div><div class="val">'+(i.usuarios?.nombre||'—')+'</div></div>' +

    '</div>' +
    '<table><thead><tr><th>Campo evaluado</th><th>Resultado</th></tr></thead><tbody>'+camposRows+'</tbody></table>' +
    (activos.length?'<div style="margin-top:12px;font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;margin-bottom:6px">Activos solicitados</div>'+activos.map(a=>'<div style="color:#B91C1C;font-size:11px;padding:2px 0">• '+(a.activo||a)+(Array.isArray(a.subpartes)&&a.subpartes.length?' ('+a.subpartes.join(', ')+')':'')+'</div>').join(''):'') +
    (i.observacion_general?'<div style="background:#F8FAFC;padding:9px;border-radius:6px;margin-top:10px;font-size:11px"><strong>Observación:</strong> '+i.observacion_general+'</div>':'') +
    '<div class="footer"><span>Taxi Directo · Sistema de Gestión de Flota</span><span>'+new Date().toLocaleString('es-PE')+'</span></div>' +
    '<br class="no-print"><button onclick="window.print()" class="no-print" style="padding:8px 16px;background:#1A56DB;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px">🖨 Imprimir / Guardar PDF</button>' +
    '</body></html>');
  w.document.close();

<script>
// --- BLOQUEOS -----------------------------
async function renderBloqueos() {
  const {data, error} = await sb.from('bloqueos').select('*,conductores(codigo,nombre,placa,vehiculo,flotas(nombre))').eq('subsanado',false).order('created_at',{ascending:false});
  if (error) { document.getElementById('main-content').innerHTML = '<div class="card"><div class="alert alert-danger"><div class="at">Error cargando bloqueos: '+error.message+'</div></div></div>'; return; }
  const hoy = new Date();
  const vencenHoy = (data||[]).filter(b => b.tipo==='incidencia' && b.fecha_reactivacion && new Date(b.fecha_reactivacion)<=hoy && b.confirmado);

  let html = '<h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Bloqueos y suspensiones</h2>';
  if (vencenHoy.length) html += '<div class="alert alert-success"><div class="at"><i class="ti ti-bell"></i> '+vencenHoy.length+' suspensión(es) cumplida(s) hoy — reactivar conductor</div></div>';
  html += '<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="btn btn-danger btn-sm" onclick="abrirFormBloqueo()"><i class="ti ti-plus"></i> Nueva suspensión / bloqueo</button></div>';
  html += '<div class="card"><table><thead><tr><th>Conductor</th><th>Placa · Vehículo</th><th>Flota</th><th>Tipo</th><th>Detalle</th><th>Días restantes</th><th>Estado</th><th>Acción</th></tr></thead><tbody>';
  if (!data?.length) {
    html += '<tr><td colspan="8" style="text-align:center;color:var(--gray-400);padding:20px">Sin bloqueos activos ✓</td></tr>';
  } else {
    data.forEach(b => {
      let diasTxt = 'Hasta subsanar', diasCol = 'var(--red)';
      if (b.tipo==='incidencia' && b.fecha_reactivacion) {
        const diff = Math.ceil((new Date(b.fecha_reactivacion)-hoy)/864e5);
        diasTxt = diff<=0 ? 'Vence hoy' : diff+'d restantes';
        diasCol = diff<=1 ? 'var(--red)' : 'var(--amber)';
      }
      html += '<tr>' +
        '<td><div style="font-weight:600">'+(b.conductores?.nombre||'—')+'</div><div style="font-size:10px;color:var(--gray-400)">'+(b.conductores?.codigo||'—')+'</div></td>' +
        '<td style="font-size:11px">'+(b.conductores?.placa||'—')+' · '+(b.conductores?.vehiculo||'—')+'</td>' +
        '<td>'+badge(b.conductores?.flotas?.nombre||'—','info')+'</td>' +
        '<td>'+badge(b.tipo==='inspeccion'?'Sin inspección':'Suspensión',b.tipo==='inspeccion'?'danger':'warn')+'</td>' +
        '<td style="font-size:11px;color:var(--gray-600)">'+(b.tipo==='incidencia'?'Suspendido '+(b.dias_suspension||1)+'d':b.mes_referencia||'—')+'</td>' +
        '<td style="font-weight:700;font-size:11px;color:'+diasCol+'">'+diasTxt+'</td>' +
        '<td>'+badge(b.confirmado?'Bloqueado':'Por bloquear',b.confirmado?'danger':'warn')+'</td>' +
        '<td style="display:flex;gap:4px;flex-wrap:wrap">' +
          (!b.confirmado ? '<button class="btn btn-sm btn-danger" onclick="confirmarBloqueo(\''+b.id+'\')"><i class="ti ti-lock"></i> Bloquear</button>' : '') +
          (b.confirmado ? '<button class="btn btn-sm btn-primary" onclick="reactivar(\''+b.id+'\',\''+( b.conductores?.nombre||'').replace(/'/g,'')+'\')"><i class="ti ti-check"></i> Reactivar</button>' : '') +
        '</td></tr>';
    });
  }
  html += '</tbody></table></div>';
  document.getElementById('main-content').innerHTML = html;
}

async function abrirFormBloqueo() {
  let condData = null;
  openModal('form-bloqueo', '<i class="ti ti-lock" style="color:var(--red)"></i> Nueva suspensión / bloqueo',
    '<div class="form-grid">' +
      '<div class="form-field"><label class="form-label2">Código conductor</label><input type="text" id="nb-cod" oninput="buscarCondBlq()" placeholder="Ej: 205"></div>' +
      '<div class="form-field"><label class="form-label2">Conductor (auto)</label><input type="text" id="nb-nm" readonly style="background:var(--gray-50)"></div>' +
    '</div>' +
    '<div class="form-grid">' +
      '<div class="form-field"><label class="form-label2">Placa (auto)</label><input type="text" id="nb-placa" readonly style="background:var(--gray-50)"></div>' +
      '<div class="form-field"><label class="form-label2">Vehículo (auto)</label><input type="text" id="nb-vh" readonly style="background:var(--gray-50)"></div>' +
    '</div>' +
    '<div class="form-field" style="margin-bottom:10px"><label class="form-label2">Motivo del bloqueo</label>' +
      '<select id="nb-motivo" onchange="toggleDiasBlq()">' +
        '<option value="">Seleccionar...</option>' +
        '<option value="incidencia_1">Incidencia — Suspensión 1 día</option>' +
        '<option value="incidencia_2">Incidencia — Suspensión 2 días</option>' +
        '<option value="incidencia_3">Incidencia — Suspensión 3 días</option>' +
        '<option value="mal_estado">Auto en mal estado</option>' +
      '</select>' +
    '</div>' +
    '<div id="nb-react-box" style="display:none;margin-bottom:10px;padding:9px;background:var(--green-bg);border-radius:8px;font-size:12px;color:var(--green);font-weight:600">' +
      'Fecha de reactivación: <span id="nb-react-fecha"></span>' +
    '</div>' +
    '<div class="form-field" style="margin-bottom:14px"><label class="form-label2">Detalle del bloqueo</label><textarea id="nb-detalle" rows="2" placeholder="Describe el motivo detallado..."></textarea></div>' +
    '<div style="display:flex;gap:8px">' +
      '<button class="btn btn-danger" onclick="guardarBloqueo()"><i class="ti ti-lock"></i> Generar bloqueo</button>' +
      '<button class="btn" onclick="closeModal()">Cancelar</button>' +
    '</div>' +
    '<div id="nb-ok" class="alert alert-success" style="display:none;margin-top:10px"><div class="at">✓ Bloqueo registrado correctamente</div></div>'
  );
}

let _nbCondId = null;
async function buscarCondBlq() {
  const v = document.getElementById('nb-cod').value.trim().toUpperCase();
  if (v.length < 2) return;
  const {data} = await sb.from('conductores').select('id,nombre,placa,vehiculo').eq('codigo',v).single();
  if (data) {
    _nbCondId = data.id;
    document.getElementById('nb-nm').value = data.nombre;
    document.getElementById('nb-placa').value = data.placa||'—';
    document.getElementById('nb-vh').value = data.vehiculo||'—';
  }
}

function toggleDiasBlq() {
  const v = document.getElementById('nb-motivo').value;
  const box = document.getElementById('nb-react-box');
  if (v.startsWith('incidencia_')) {
    const dias = parseInt(v.split('_')[1]);
    const f = new Date(); f.setDate(f.getDate()+dias);
    document.getElementById('nb-react-fecha').textContent = f.toLocaleDateString('es-PE',{day:'numeric',month:'long',year:'numeric'});
    window._nbFechaReact = f.toISOString().slice(0,10);
    window._nbDias = dias;
    box.style.display = 'block';
  } else {
    box.style.display = 'none';
    window._nbFechaReact = null;
    window._nbDias = 0;
  }
}

async function guardarBloqueo() {
  if (!_nbCondId) { alert('Ingresa un código válido'); return; }
  const motivo = document.getElementById('nb-motivo').value;
  const detalle = document.getElementById('nb-detalle').value.trim();
  if (!motivo) { alert('Selecciona el motivo'); return; }
  if (!detalle) { alert('Escribe el detalle'); return; }
  const tipo = motivo==='mal_estado' ? 'inspeccion' : 'incidencia';
  const blqData = {
    conductor_id: _nbCondId, tipo, confirmado: true,
    fecha_bloqueo: new Date().toISOString().slice(0,10),
    inspector_bloqueo: CP?.nombre||'Admin',
    dias_suspension: window._nbDias||0,
    fecha_reactivacion: window._nbFechaReact||null,
    mes_referencia: new Date().toISOString().slice(0,7)
  };
  // Try with detalle, fallback without
  let {error} = await sb.from('bloqueos').insert({...blqData, detalle});
  if (error?.message?.includes('detalle')) {
    const r2 = await sb.from('bloqueos').insert(blqData);
    error = r2.error;
  }
  if (error) { alert('Error: '+error.message); return; }
  document.getElementById('nb-ok').style.display = 'block';
  _nbCondId = null;
  setTimeout(() => { closeModal(); renderBloqueos(); }, 1500);
}

async function confirmarBloqueo(id) {
  await sb.from('bloqueos').update({confirmado:true,fecha_bloqueo:new Date().toISOString().slice(0,10),inspector_bloqueo:CP?.nombre||'Admin'}).eq('id',id);
  renderBloqueos();
}

async function reactivar(id, nombre) {
  if (!confirm('¿Reactivar a '+nombre+'?')) return;
  await sb.from('bloqueos').update({subsanado:true,fecha_subsanacion:new Date().toISOString().slice(0,10)}).eq('id',id);
  alert('✅ '+nombre+' reactivado correctamente.');
  renderBloqueos();
}

// --- COMPROMISOS --------------------------
async function renderCompromisos() {
  const {data, error: errComp} = await sb.from('compromisos').select('*,conductores!compromisos_conductor_id_fkey(codigo,nombre,placa,vehiculo,flotas(nombre))').order('fecha_limite');
  if (errComp) { document.getElementById('main-content').innerHTML = '<div class="card"><div class="alert alert-danger"><div class="at">Error cargando compromisos: '+errComp.message+'</div></div></div>'; return; }
  const hoy = new Date();
  const urgentes = (data||[]).filter(c => c.estado!=='resuelto' && Math.round((new Date(c.fecha_limite)-hoy)/864e5)<=3).length;
  let html = '<h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Compromisos vehiculares</h2>';
  if (urgentes) html += '<div class="alert alert-warn"><div class="at"><i class="ti ti-alarm"></i> '+urgentes+' compromiso(s) vence(n) en los próximos 3 días</div></div>';
  html += '<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="btn btn-primary btn-sm" onclick="abrirFormCompromiso()"><i class="ti ti-plus"></i> Nuevo compromiso</button></div>';
  html += '<div class="search-bar"><i class="ti ti-search"></i><input type="text" id="bus-comp" placeholder="Buscar..." oninput="filtrarComp()"><span class="search-count" id="cnt-comp">'+(data?.length||0)+' registros</span></div>';
  html += '<div id="comp-list"></div>';
  document.getElementById('main-content').innerHTML = html;
  window._compData = data||[];
  renderCompList(data||[]);
}

function filtrarComp() {
  const q = (document.getElementById('bus-comp')?.value||'').toLowerCase();
  const fil = window._compData.filter(c => !q || [c.conductores?.nombre,c.conductores?.codigo,c.titulo,c.descripcion].some(f=>f?.toLowerCase().includes(q)));
  document.getElementById('cnt-comp').textContent = fil.length+' registros';
  renderCompList(fil);
}

function renderCompList(data) {
  const el = document.getElementById('comp-list');
  if (!el) return;
  if (!data.length) { el.innerHTML = '<p style="color:var(--gray-400);text-align:center;padding:20px">Sin compromisos registrados</p>'; return; }
  const hoy = new Date();
  const sorted = [...data].sort((a,b) => {
    if(a.estado==='resuelto'&&b.estado!=='resuelto') return 1;
    if(a.estado!=='resuelto'&&b.estado==='resuelto') return -1;
    return new Date(a.fecha_limite)-new Date(b.fecha_limite);
  });
  el.innerHTML = sorted.map(c => {
    const dias = Math.round((new Date(c.fecha_limite)-hoy)/864e5);
    const badgeCls = c.estado==='resuelto'?'ok':dias<0?'danger':dias<=3?'warn':'gray';
    const badgeTxt = c.estado==='resuelto'?'✓ Resuelto':dias<0?'⚠ Vencido':dias<=3?'⏰ Vence pronto':'Pendiente';
    return '<div class="card" style="'+(dias<=3&&c.estado!=='resuelto'?'border-color:#FCD34D;':'')+'">' +
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px">' +
        '<div><div style="font-size:13px;font-weight:700">'+(c.titulo||'Sin título')+'</div>' +
        '<div style="font-size:11px;color:var(--gray-600);margin-top:3px">'+(c.conductores?.nombre||'—')+' · '+(c.conductores?.codigo||'—')+' · '+badge(c.conductores?.flotas?.nombre||'—','info')+'</div>' +
        (c.conductores?.placa?'<div style="font-size:10px;color:var(--gray-400);margin-top:2px">Placa: '+c.conductores.placa+' · '+( c.conductores.vehiculo||'—')+'</div>':'') +
        (c.descripcion?'<div style="font-size:11px;color:var(--gray-600);margin-top:4px">'+c.descripcion+'</div>':'') +
        '</div>' + badge(badgeTxt,badgeCls) +
      '</div>' +
      '<div style="font-size:11px;color:var(--gray-400);margin-bottom:8px"><i class="ti ti-calendar"></i> Plazo: <strong>'+( c.fecha_limite||'—')+'</strong>'+(dias>=0&&c.estado!=='resuelto'?' ('+dias+'d restantes)':'')+'</div>' +
      (c.estado!=='resuelto' ?
        '<div style="display:flex;gap:7px">' +
          '<button class="btn btn-sm" onclick="editarComp(\''+c.id+'\',\''+( c.descripcion||'').replace(/'/g,'')+'\',\''+c.fecha_limite+'\')"><i class="ti ti-edit"></i> Editar</button>' +
          '<button class="btn btn-sm btn-primary" onclick="resolverComp(\''+c.id+'\')"><i class="ti ti-check"></i> Marcar resuelto</button>' +
        '</div>' :
        '<div style="background:var(--green-bg);border-left:3px solid #34D399;border-radius:0 7px 7px 0;padding:7px 10px">' +
          '<div style="font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase">Resuelto · '+(c.fecha_resolucion||'—')+'</div>' +
          '<div style="font-size:11px;color:var(--gray-800);margin-top:2px">'+(c.nota_resolucion||'—')+'</div>' +
        '</div>'
      ) +
    '</div>';
  }).join('');
}

let _ncCondData = null, _ncCondCompartido = null;
async function buscarCondComp() {
  const v = document.getElementById('nc-cod').value.trim().toUpperCase();
  if (v.length < 2) return;
  const {data} = await sb.from('conductores').select('id,nombre,placa,vehiculo').eq('codigo',v).single();
  if (!data) return;
  _ncCondData = data;
  document.getElementById('nc-nm').value = data.nombre;
  document.getElementById('nc-placa').value = data.placa||'—';
  document.getElementById('nc-vh').value = data.vehiculo||'—';
  // Check shared car
  if (data.placa) {
    const {data:comp} = await sb.from('conductores').select('id,nombre,codigo,estado').eq('placa',data.placa).neq('id',data.id).neq('estado','desactivado');
    _ncCondCompartido = comp?.length ? comp : null;
    const alertEl = document.getElementById('nc-placa-alert');
    if (alertEl && comp?.length) {
      alertEl.innerHTML = '<div class="alert alert-warn" style="margin-bottom:10px"><div class="at">⚠ Placa '+data.placa+' compartida con: '+comp.map(c=>c.nombre+' ('+c.codigo+')').join(', ')+'</div><div style="font-size:11px;color:var(--amber);margin-top:4px">Si el compromiso es vehicular, se aplicará a ambos conductores.</div></div>';
    }
  }
}

async function guardarCompromiso() {
  if (!_ncCondData) { alert('Ingresa un código válido'); return; }
  const motivo = document.getElementById('nc-motivo').value;
  const desc = document.getElementById('nc-desc').value.trim();
  const fecha = document.getElementById('nc-fecha').value;
  if (!desc) { alert('Describe el compromiso'); return; }
  if (!fecha) { alert('Selecciona la fecha de levantamiento'); return; }
  const esVehicular = motivo !== 'Otro';
  let fotoUrl = null;
  const fileEl = document.getElementById('nc-foto');
  if (fileEl?.files?.length) {
    const file = fileEl.files[0];
    const path = 'compromisos/dano_'+Date.now()+'.jpg';
    const {error:upErr} = await sb.storage.from('evidencias').upload(path,file,{upsert:true});
    if (!upErr) { const {data:ud} = sb.storage.from('evidencias').getPublicUrl(path); fotoUrl = ud.publicUrl; }
  }
  const {error} = await sb.from('compromisos').insert({
    conductor_id: _ncCondData.id, usuario_id: CU.id,
    titulo: motivo+': '+desc.slice(0,60), tipo_dano: motivo, descripcion: desc,
    fecha_limite: fecha, estado: 'pendiente', foto_evidencia: fotoUrl,
    placa_vehiculo: _ncCondData.placa||'', generado_por_conductor_id: _ncCondData.id,
    afecta_conductores: [], es_vehicular: esVehicular
  });
  if (error) { alert('Error: '+error.message); return; }
  // If shared car and vehicular
  if (esVehicular && _ncCondCompartido?.length) {
    for (const af of _ncCondCompartido) {
      await sb.from('compromisos').insert({
        conductor_id: af.id, usuario_id: CU.id,
        titulo: '[Carro compartido] '+motivo+': '+desc.slice(0,50),
        tipo_dano: motivo, descripcion: desc+' — Placa compartida con '+_ncCondData.nombre,
        fecha_limite: fecha, estado: 'pendiente',
        placa_vehiculo: _ncCondData.placa||'', generado_por_conductor_id: _ncCondData.id, es_vehicular: true
      });
    }
    alert('⚠ Compromiso registrado para '+_ncCondData.nombre+' y '+_ncCondCompartido.map(c=>c.nombre).join(', ')+' (carro compartido)');
  }
  document.getElementById('nc-ok').style.display = 'block';
  _ncCondData = null; _ncCondCompartido = null;
  setTimeout(() => { closeModal(); renderCompromisos(); }, 1500);
}

async function editarComp(id, desc, fecha) {
  const newDesc = prompt('Descripción:', desc); if (newDesc===null) return;
  const newFecha = prompt('Fecha de levantamiento (YYYY-MM-DD):', fecha); if (!newFecha) return;
  await sb.from('compromisos').update({descripcion:newDesc,titulo:newDesc.slice(0,80),fecha_limite:newFecha}).eq('id',id);
  renderCompromisos();
}

async function resolverComp(id) {
  const nota = prompt('Describe cómo se subsanó el daño:'); if (!nota) return;
  await sb.from('compromisos').update({estado:'resuelto',fecha_resolucion:new Date().toISOString().slice(0,10),nota_resolucion:nota,inspector_resolucion:CP?.nombre||'Admin'}).eq('id',id);
  renderCompromisos();
}

<script>
// --- CONSTRUCTOR --------------------------

          '<div style="display:flex;align-items:center;gap:7px">' +
            '<div style="flex:1">' +
              '<div style="font-size:12px;font-weight:600">'+c.nombre+(c.obligatorio?'<span style="color:var(--red);margin-left:2px;font-size:10px">*</span>':'')+'</div>' +
              '<div style="font-size:10px;color:var(--gray-400)">'+c.tipo+' · '+(c.seccion||'—')+'</div>' +
              (c.tipo==='opciones'&&c.opciones?.length?'<div style="font-size:10px;color:var(--blue);margin-top:2px">'+c.opciones.join(' · ')+'</div>':'') +
            '</div>' +
            badge(c.activo?'Activo':'Inactivo',c.activo?'ok':'gray') +
            (c.tipo==='opciones'||c.tipo==='multiopciones'?'<button class="btn btn-sm edit-opts" data-cid="'+c.id+'" title="Editar opciones"><i class="ti ti-list"></i></button>':'') +
            '<button class="btn btn-sm" onclick="toggleCampo(\''+c.id+'\','+(!c.activo)+')"><i class="ti ti-'+(c.activo?'eye-off':'eye')+'"></i></button>' +
          '</div>' +
        '</div>';
      });
    }
    html+='</div>';
  });
  html+='</div>';
  document.getElementById('main-content').innerHTML=html;

async function agregarCampo(formulario){
  const nombre=prompt('Nombre del campo:');if(!nombre)return;
  const tipoNum=prompt('Tipo:\n1=Sí/No\n2=Lista de opciones\n3=Multiselección\n4=Escala 1-5\n5=Texto libre','1');
  const tipoMap={'1':'sino','2':'opciones','3':'multiopciones','4':'escala','5':'texto'};
  const tipo=tipoMap[tipoNum]||'sino';
  const seccion=prompt('Sección:','General');
  const oblig=confirm('¿Es obligatorio?');
  let opciones=null;
  if(tipo==='opciones'||tipo==='multiopciones'){
    const op=prompt('Opciones separadas por coma:');
    if(op)opciones=op.split(',').map(o=>o.trim()).filter(Boolean);
  }
  const{error}=await sb.from('formulario_campos').insert({formulario,nombre,tipo,seccion,obligatorio:oblig,activo:true,orden:999,opciones});
  if(error){alert('Error: '+error.message);return;}
  renderConstructor();
}

async function editarOpciones(id,optsJson){
  let opts=[];try{opts=JSON.parse(optsJson);}catch(e){}
  const nuevo=prompt('Editar opciones (separadas por coma):',opts.join(', '));
  if(nuevo===null)return;
  const opciones=nuevo.split(',').map(o=>o.trim()).filter(Boolean);
  await sb.from('formulario_campos').update({opciones}).eq('id',id);
  renderConstructor();
}

async function toggleCampo(id,activo){
  await sb.from('formulario_campos').update({activo}).eq('id',id);
  renderConstructor();
}

// --- REPORTES -----------------------------
async function renderReportes(){
  const mesActual = new Date().toISOString().slice(0,7);
  if (!window._reporteMes) window._reporteMes = mesActual;
  const mesSeleccionado = window._reporteMes;

  const [{data:mesesData},{data:conds},{data:inspMes},{data:camposDB}] = await Promise.all([
    sb.from('inspecciones').select('mes_referencia').order('mes_referencia',{ascending:false}),
    sb.from('conductores').select('id,codigo,nombre,placa,vehiculo,categoria,estado,flotas(nombre)').neq('estado','desactivado'),
    sb.from('inspecciones').select('conductor_id,campos_evaluados,score_experiencia,fecha').eq('mes_referencia',mesSeleccionado).order('fecha',{ascending:false}),
    sb.from('formulario_campos').select('id,nombre').eq('formulario','inspeccion'),
  ]);

  const mesesSet = [...new Set((mesesData||[]).map(i=>i.mes_referencia))];
  const fieldDefs = {};
  (camposDB||[]).forEach(f => fieldDefs[f.id] = f.nombre);

  const ultimaMes = {};
  (inspMes||[]).forEach(i=>{ if(!ultimaMes[i.conductor_id]) ultimaMes[i.conductor_id]=i; });

  // Estadísticas
  const porComb={}, porFlotaInsp={};
  const manijas={'Delantera izquierda':{si:0,no:0},'Delantera derecha':{si:0,no:0},'Trasera izquierda':{si:0,no:0},'Trasera derecha':{si:0,no:0}};

  (conds||[]).forEach(c=>{
    const fl = c.flotas?.nombre||'Sin flota';
    if(!porFlotaInsp[fl]) porFlotaInsp[fl]={total:0,insp:0};
    porFlotaInsp[fl].total++;
    const insp = ultimaMes[c.id];
    if(insp){
      porFlotaInsp[fl].insp++;
      if(insp.campos_evaluados){
        Object.entries(insp.campos_evaluados).forEach(([k,v])=>{
          const nombre = fieldDefs[k]||k;
          const nl = nombre.toLowerCase();
          if(nl.includes('combustible')){ const val=Array.isArray(v)?v.join(', '):String(v); porComb[val]=(porComb[val]||0)+1; }
          if(nl.includes('delantera izquierda')) manijas['Delantera izquierda'][v==='si'?'si':'no']++;
          if(nl.includes('delantera derecha')) manijas['Delantera derecha'][v==='si'?'si':'no']++;
          if(nl.includes('trasera izquierda')) manijas['Trasera izquierda'][v==='si'?'si':'no']++;
          if(nl.includes('trasera derecha')) manijas['Trasera derecha'][v==='si'?'si':'no']++;
        });
      }
    }
  });

  window._reporteData = conds||[];
  window._reporteUltimaMes = ultimaMes;
  window._reporteFieldDefs = fieldDefs;
  window._reportePorComb = porComb;
  // Recopilar cabeceras únicas
  const cabValues = {};
  (conds||[]).forEach(c=>{
    const insp = ultimaMes[c.id];
    if(insp?.campos_evaluados){
      Object.entries(insp.campos_evaluados).forEach(([k,v])=>{
        const nombre = fieldDefs[k]||k;
        if(nombre.toLowerCase().includes('cabecera') && v){
          const val = Array.isArray(v)?v.join(', '):String(v);
          cabValues[val] = (cabValues[val]||0)+1;
        }
      });
    }
  });
  window._reporteCabValues = cabValues;

  const totalInsp = Object.keys(ultimaMes).length;
  const totalConds = conds?.length||0;
  const pctGlobal = totalConds ? Math.round(totalInsp/totalConds*100) : 0;
  const colGlobal = pctGlobal>=80?'var(--green)':pctGlobal>=50?'var(--amber)':'var(--red)';

  let html = '<h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Reportes y filtros de flota</h2>';

  // Selector mes
  html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:12px 16px;background:#fff;border:1.5px solid var(--gray-200);border-radius:10px;flex-wrap:wrap">' +
    '<i class="ti ti-calendar" style="color:var(--blue);font-size:18px"></i>' +
    '<label style="font-size:12px;font-weight:700;color:var(--gray-600);text-transform:uppercase;letter-spacing:.04em">Mes</label>' +
    '<select onchange="window._reporteMes=this.value;renderReportes()" style="font-size:13px;font-weight:600;border:1.5px solid var(--blue);border-radius:7px;padding:6px 12px;color:var(--blue);font-family:inherit">' +
    (mesesSet.length ? mesesSet.map(m=>'<option value="'+m+'"'+(m===mesSeleccionado?' selected':'')+'>'+m+'</option>').join('') : '<option value="'+mesSeleccionado+'">'+mesSeleccionado+'</option>') +
    '</select>' +
    '<div style="display:flex;align-items:center;gap:8px;margin-left:auto">' +
      '<span style="font-size:12px;color:var(--gray-600)"><strong style="font-size:20px;color:'+colGlobal+'">'+pctGlobal+'%</strong> avance — '+totalInsp+' de '+totalConds+' conductores</span>' +
      '<div class="progress-bg" style="width:120px"><div class="progress-fill" style="width:'+pctGlobal+'%;background:'+colGlobal+'"></div></div>' +
    '</div>' +
  '</div>';

  // Avance por flota individual
  html += '<div class="card" style="margin-bottom:14px"><div class="card-title">Avance por flota — '+mesSeleccionado+'</div>' +
    '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">' +
    Object.entries(porFlotaInsp).sort((a,b)=>b[1].total-a[1].total).map(([fl,d])=>{
      const pct=Math.round(d.insp/Math.max(d.total,1)*100);
      const col=pct>=80?'var(--green)':pct>=50?'var(--amber)':'var(--red)';
      return '<div style="padding:10px;border:1.5px solid var(--gray-200);border-radius:9px">' +
        '<div style="font-size:12px;font-weight:700;margin-bottom:4px">'+fl+'</div>' +
        '<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="color:var(--gray-400)">'+d.insp+'/'+d.total+'</span><strong style="color:'+col+'">'+pct+'%</strong></div>' +
        '<div class="progress-bg"><div class="progress-fill" style="width:'+pct+'%;background:'+col+'"></div></div>' +
      '</div>';
    }).join('') +
    '</div></div>';

  // Cards estadísticas
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:16px">';

  // Combustible
  const totalComb = Object.values(porComb).reduce((a,b)=>a+b,0)||1;
  html += '<div class="card" style="margin-bottom:0"><div class="card-title"><i class="ti ti-gas-station" style="color:var(--blue)"></i> Tipo de combustible</div>';
  if(Object.keys(porComb).length){
    html += Object.entries(porComb).sort((a,b)=>b[1]-a[1]).map(([k,v])=>{
      const pct=Math.round(v/totalComb*100);
      return '<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;margin-bottom:3px;font-size:12px"><span>'+k+'</span><strong>'+v+' <span style="color:var(--gray-400);font-weight:400">('+pct+'%)</span></strong></div>' +
        '<div class="progress-bg"><div class="progress-fill" style="width:'+pct+'%;background:var(--blue)"></div></div></div>';
    }).join('');
  } else html += '<p style="color:var(--gray-400);font-size:12px;padding:8px 0">Sin datos para este mes</p>';
  html += '</div>';

  // Manijas
  html += '<div class="card" style="margin-bottom:0"><div class="card-title"><i class="ti ti-hand-click" style="color:var(--blue)"></i> Manijas eléctricas</div>';
  html += Object.entries(manijas).map(([k,v])=>{
    const total=v.si+v.no; const pct=total>0?Math.round(v.si/total*100):0;
    return '<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">' +
      '<span>'+k+'</span>' +
