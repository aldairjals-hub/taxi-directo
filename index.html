function aplicarFiltros(){
  const cat = document.getElementById('f-cat')?.value||'';
  const est = document.getElementById('f-estado')?.value||'';
  const flota = document.getElementById('f-flota')?.value||'';
  const inspFiltro = document.getElementById('f-insp')?.value||'';
  const combFiltro = document.getElementById('f-comb')?.value||'';
  const cabFiltro = document.getElementById('f-cab')?.value||'';
  const busq = (document.getElementById('f-busq')?.value||'').toLowerCase();
  let data = window._reporteData||[];
  if(cat) data=data.filter(c=>c.categoria===cat);
  if(est) data=data.filter(c=>c.estado===est);
  if(flota) data=data.filter(c=>c.flotas?.nombre===flota);
  if(inspFiltro==='si') data=data.filter(c=>window._reporteUltimaMes?.[c.id]);
  if(inspFiltro==='no') data=data.filter(c=>!window._reporteUltimaMes?.[c.id]);
  if(combFiltro) data=data.filter(c=>{
    const insp=window._reporteUltimaMes?.[c.id];
    if(!insp?.campos_evaluados) return false;
    return Object.entries(insp.campos_evaluados).some(([k,v])=>{
      const nombre=(window._reporteFieldDefs[k]||k).toLowerCase();
      const val=Array.isArray(v)?v.join(', '):String(v);
      return nombre.includes('combustible')&&val===combFiltro;
    });
  });
  if(cabFiltro) data=data.filter(c=>{
    const insp=window._reporteUltimaMes?.[c.id];
    if(!insp?.campos_evaluados) return false;
    return Object.entries(insp.campos_evaluados).some(([k,v])=>{
      const nombre=(window._reporteFieldDefs[k]||k).toLowerCase();
      const val=Array.isArray(v)?v.join(', '):String(v);
      return nombre.includes('cabecera')&&val===cabFiltro;
    });
  });
  if(busq) data=data.filter(c=>[c.nombre,c.codigo,c.placa].some(f=>f?.toLowerCase().includes(busq)));
  document.getElementById('f-count').textContent = data.length+' conductores';
  document.getElementById('f-tbody').innerHTML = data.map(c=>{
    const insp = window._reporteUltimaMes?.[c.id];
    let comb='—', score='—', scoreNum=0;
    if(insp?.campos_evaluados){
      Object.entries(insp.campos_evaluados).forEach(([k,v])=>{
        const nombre=(window._reporteFieldDefs[k]||k).toLowerCase();
        if(nombre.includes('combustible')) comb=Array.isArray(v)?v.join(', '):String(v);
      });
      if(insp.score_experiencia!=null){ scoreNum=insp.score_experiencia; score=scoreNum+'%'; }
    }
    const scoreCol = insp ? (scoreNum>=80?'var(--green)':scoreNum>=60?'var(--amber)':'var(--red)') : 'var(--gray-400)';
    return '<tr>' +
      '<td style="font-family:monospace;font-size:10px">'+c.codigo+'</td>' +
      '<td style="font-weight:600">'+c.nombre+'</td>' +
      '<td>'+badge(c.flotas?.nombre||'—','info')+'</td>' +
      '<td style="font-size:11px">'+(c.vehiculo||'—')+(c.placa?' · '+c.placa:'')+'</td>' +
      '<td>'+badge(c.estado,c.estado==='activo'?'ok':'warn')+'</td>' +
      '<td>'+badge(insp?'✓ Inspeccionado':'Sin inspección',insp?'ok':'gray')+'</td>' +
      '<td style="font-size:11px">'+comb+'</td>' +
      '<td style="font-weight:700;font-size:11px;color:'+scoreCol+'">'+score+'</td>' +
    '</tr>';
  }).join('');
}

async function exportarReporteXlsx(){
  let data = window._reporteData||[];
  const cat=document.getElementById('f-cat')?.value; const est=document.getElementById('f-estado')?.value;
  const flota=document.getElementById('f-flota')?.value; const busq=(document.getElementById('f-busq')?.value||'').toLowerCase();
  const inspFiltro=document.getElementById('f-insp')?.value||'';
  if(cat) data=data.filter(c=>c.categoria===cat);
  if(est) data=data.filter(c=>c.estado===est);
  if(flota) data=data.filter(c=>c.flotas?.nombre===flota);
  if(inspFiltro==='si') data=data.filter(c=>window._reporteUltimaMes?.[c.id]);
  if(inspFiltro==='no') data=data.filter(c=>!window._reporteUltimaMes?.[c.id]);
  if(busq) data=data.filter(c=>[c.nombre,c.codigo,c.placa].some(f=>f?.toLowerCase().includes(busq)));
  const fieldDefs = window._reporteFieldDefs||{};
  const mes = window._reporteMes||new Date().toISOString().slice(0,7);
  const rows = data.map(c=>{
    const insp = window._reporteUltimaMes?.[c.id];
    let comb='', score='';
    if(insp?.campos_evaluados){
      Object.entries(insp.campos_evaluados).forEach(([k,v])=>{
        const nombre=(window._reporteFieldDefs[k]||k).toLowerCase();
        if(nombre.includes('combustible')) comb=Array.isArray(v)?v.join(', '):String(v);
      });
      if(insp.score_experiencia!=null) score=insp.score_experiencia+'%';
    }
    const row = {};
    row['Codigo'] = String(c.codigo||'');
    row['Conductor'] = String(c.nombre||'');
    row['Flota'] = String(c.flotas?.nombre||'');
    row['Vehiculo'] = String(c.vehiculo||'');
    row['Placa'] = String(c.placa||'');
    row['Categoria'] = String(c.categoria||'');
    row['Estado'] = String(c.estado||'');
    row['Inspeccion_'+mes] = insp?'Si':'No';
    row['Combustible'] = String(comb||'');
    row['Score'] = String(score||'');
    return row;
  });
  if(!rows.length){alert('Sin datos para exportar');return;}
  try {
    const wb = new ExcelJS.Workbook();
    const ws = wb.addWorksheet('Reporte');
    ws.addRow(['Codigo','Conductor','Flota','Vehiculo','Placa','Categoria','Estado','Inspeccion_'+mes,'Combustible','Score']);
    rows.forEach(r => {
      ws.addRow([
        String(r['Codigo']||''),String(r['Conductor']||''),String(r['Flota']||''),
        String(r['Vehiculo']||''),String(r['Placa']||''),String(r['Categoria']||''),
        String(r['Estado']||''),String(r['Inspeccion_'+mes]||''),
        String(r['Combustible']||''),String(r['Score']||'')
      ]);
    });
    const buf = await wb.xlsx.writeBuffer();
    const blob = new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download='reporte_'+mes+'.xlsx'; a.click();
    URL.revokeObjectURL(url);
  } catch(e) { alert('Error: '+e.message); }
}

async function parsearPadron(){
  const file=document.getElementById('padron-file').files[0];if(!file)return;
  const el=document.getElementById('padron-preview');
  el.innerHTML='<div class="loader">Procesando archivo...</div>';
  try{
    const isXlsx = file.name.endsWith('.xlsx')||file.name.endsWith('.xls');
    let data=[];
    if(isXlsx){
      const buf = await file.arrayBuffer();
      const wb2 = new ExcelJS.Workbook();
      await wb2.xlsx.load(buf);
      const ws2 = wb2.worksheets[0];
      const raw2 = [];
      const hdrs2 = [];
      ws2.eachRow((row,ri)=>{
        // ExcelJS row.values[0] es undefined, data empieza en [1]
        const vals = Array.from({length: row.cellCount}, (_,i) => {
          const cell = row.getCell(i+1);
          return cell.value===null||cell.value===undefined?'':String(cell.value);
        });
        if(ri===1){ vals.forEach(h=>hdrs2.push(h.toLowerCase().trim())); }
        else{
          const obj={};
          vals.forEach((v,i)=>{ if(hdrs2[i]) obj[hdrs2[i]]=v; });
          if(obj.codigo||obj.nombre) raw2.push(obj);
        }
      });
      const raw = raw2;
      // Normalizar headers
      data = raw.map(r=>{
        const obj={};
        Object.entries(r).forEach(([k,v])=>{ obj[k.toLowerCase().trim().replace(/[áa]/g,'a').replace(/[éeè]/g,'e').replace(/[íi]/g,'i').replace(/[óo]/g,'o').replace(/[úu]/g,'u').replace(/[^a-z]/g,'')]=(v||'').toString().trim(); });
        return obj;
      }).filter(r=>r.codigo&&r.nombre);
    } else {
      const text=await file.text();
      const rows=text.split('\n').filter(r=>r.trim());
      const headers=rows[0].split(',').map(h=>h.trim().toLowerCase().replace(/[áa]/g,'a').replace(/[éeè]/g,'e').replace(/[íi]/g,'i').replace(/[óo]/g,'o').replace(/[úu]/g,'u').replace(/[^a-z]/g,''));
      data=rows.slice(1).map(r=>{const cols=r.split(',');const obj={};headers.forEach((h,i)=>{obj[h]=(cols[i]||'').trim().replace(/"/g,'');});return obj;}).filter(r=>r.codigo&&r.nombre);
    }
    window._padronRows2=data;
    el.innerHTML='<div class="alert alert-info" style="margin-bottom:10px"><div class="at"><i class="ti ti-file-check"></i> '+data.length+' conductores detectados en el archivo</div></div>'+
      '<div style="font-size:11px;color:var(--gray-600);margin-bottom:10px">Vista previa (primeros 3): '+data.slice(0,3).map(r=>r.nombre+' ('+r.codigo+') — '+r.estado).join(', ')+'</div>'+
      '<div style="display:flex;gap:8px"><button class="btn btn-primary" onclick="subirPadron(window._padronRows2)"><i class="ti ti-upload"></i> Confirmar carga ('+data.length+' conductores)</button><button class="btn" onclick="renderPadron()">Cancelar</button></div>';
  }catch(e){el.innerHTML='<div class="alert alert-danger"><div class="at">Error al leer el archivo: '+e.message+'</div></div>';}
}

async function subirPadron(rows){
  const{data:flotas}=await sb.from('flotas').select('id,nombre');
  const el=document.getElementById('padron-preview');
  el.innerHTML='<div class="loader">Cargando '+rows.length+' conductores...</div>';
  let ok=0,err=0;
  for(const r of rows){
    if(!r.codigo)continue;
    const fl=flotas?.find(f=>f.nombre.toLowerCase()===( r.flota||'').toLowerCase());
    const{error}=await sb.from('conductores').upsert({codigo:r.codigo.toUpperCase(),nombre:r.nombre||'',vehiculo:r.vehiculo||null,placa:r.placa||null,flota_id:fl?.id||null,estado:r.estado||'activo',categoria:r.categoria||null},{onConflict:'codigo'});
    error?err++:ok++;
  }
  el.innerHTML='<div class="alert alert-success"><div class="at">✓ '+ok+' conductores procesados'+(err?' · '+err+' errores':'')+'. Recarga la página para ver el padrón actualizado.</div></div>';
}

    '</div>' +
    '<div class="form-grid">' +
      '<div class="form-field"><label class="form-label2">Placa (auto del padrón)</label><input type="text" id="ni-placa" readonly style="background:var(--gray-50)"></div>' +
      '<div class="form-field"><label class="form-label2">Vehículo (auto del padrón)</label><input type="text" id="ni-vh" readonly style="background:var(--gray-50)"></div>' +
    '</div>' +
    '<div class="form-grid">' +
      '<div class="form-field"><label class="form-label2">Tipo de incidencia</label><select id="ni-tipo">'+tipos.map(o=>'<option>'+o+'</option>').join('')+'</select></div>' +
      '<div class="form-field"><label class="form-label2">Gravedad</label><select id="ni-grav">'+gravs.map(o=>'<option value="'+o.toLowerCase()+'">'+o+'</option>').join('')+'</select></div>' +
    '</div>' +
    '<div class="form-field" style="margin-bottom:10px"><label class="form-label2">Descripción</label><textarea id="ni-desc" rows="2" placeholder="Describe la incidencia..."></textarea></div>' +
    '<div class="form-grid">' +
      '<div class="form-field"><label class="form-label2">Acción / Sanción</label><select id="ni-accion" onchange="checkAccionInc()">'+acciones.map(o=>'<option>'+o+'</option>').join('')+'</select></div>' +
      '<div class="form-field"><label class="form-label2">Fecha</label><input type="date" id="ni-fecha" value="'+new Date().toISOString().slice(0,10)+'"></div>' +
    '</div>' +
    '<div id="ni-suspension-info" style="display:none;padding:9px;background:var(--red-bg);border-radius:8px;margin-bottom:10px;font-size:12px;color:var(--red);font-weight:600"></div>' +
    '<div style="display:flex;gap:8px">' +
      '<button class="btn btn-primary" onclick="guardarIncidencia()"><i class="ti ti-check"></i> Registrar incidencia</button>' +
      '<button class="btn" onclick="closeModal()">Cancelar</button>' +
    '</div>' +
    '<div id="ni-ok" class="alert alert-success" style="display:none;margin-top:10px"><div class="at">✓ Incidencia registrada</div></div>'
  );
}

function checkAccionInc() {
  const v = document.getElementById('ni-accion')?.value||'';
  const box = document.getElementById('ni-suspension-info');
  if (!box) return;
  if (v.includes('Suspensión')) {
    const dias = v.includes('1')?1:v.includes('2')?2:3;
    const f = new Date(); f.setDate(f.getDate()+dias);
    box.style.display = 'block';
    box.textContent = '🔒 Se creará un bloqueo de '+dias+' día(s). Reactivación: '+f.toLocaleDateString('es-PE',{day:'numeric',month:'long'});
    window._niSuspDias = dias;
    window._niReactFecha = f.toISOString().slice(0,10);
  } else if (v === 'Bloqueo') {
    box.style.display = 'block';
    box.textContent = '🔒 Se creará un bloqueo permanente hasta que sea reactivado manualmente.';
    window._niSuspDias = 0;
    window._niReactFecha = null;
  } else {
    box.style.display = 'none';
    window._niSuspDias = 0;
    window._niReactFecha = null;
  }
}

let _niCondData = null;
async function buscarCondInc() {
  const v = document.getElementById('ni-cod').value.trim().toUpperCase();
  if (v.length < 2) return;
  const {data} = await sb.from('conductores').select('id,nombre,placa,vehiculo').eq('codigo',v).single();
  if (data) {
    _niCondData = data;
    document.getElementById('ni-nm').value = data.nombre;
    document.getElementById('ni-placa').value = data.placa||'—';
    document.getElementById('ni-vh').value = data.vehiculo||'—';
  }
}

async function guardarIncidencia() {
  if (!_niCondData) { alert('Ingresa un código válido'); return; }
  const tipo = document.getElementById('ni-tipo').value;
  const desc = document.getElementById('ni-desc').value.trim();
  const grav = document.getElementById('ni-grav').value;
  const accion = document.getElementById('ni-accion').value;
  const fecha = document.getElementById('ni-fecha').value;
  if (!desc) { alert('Escribe la descripción'); return; }
  const {error} = await sb.from('incidencias').insert({
    conductor_id: _niCondData.id, usuario_id: CU.id,
    tipo, descripcion: desc, gravedad: grav,
    accion_tomada: accion, responsable_accion: CP?.nombre,
    fecha_accion: fecha, placa_vehiculo: _niCondData.placa||'',
    marca_vehiculo: _niCondData.vehiculo||'', fecha, estado: 'cerrada'
  });
  if (error) { alert('Error: '+error.message); return; }
  // If suspension or bloqueo, create bloqueo entry
  if (accion.includes('Suspensión') || accion==='Bloqueo') {
    await sb.from('bloqueos').insert({
      conductor_id: _niCondData.id, tipo: 'incidencia', confirmado: true,
      fecha_bloqueo: fecha, inspector_bloqueo: CP?.nombre||'Admin',
      dias_suspension: window._niSuspDias||0,
      fecha_reactivacion: window._niReactFecha||null,
      mes_referencia: fecha.slice(0,7),
      detalle: 'Generado por incidencia: '+desc
    });
  }
  document.getElementById('ni-ok').style.display = 'block';
  _niCondData = null;
  setTimeout(() => { closeModal(); renderIncidencias(); }, 1500);
}
</script>
<script>
// ─── ACTIVOS + SLA ────────────────────────
async function renderActivos() {
  const {data} = await sb.from('solicitudes_activos').select('*,conductores(codigo,nombre,flotas(nombre)),usuarios(nombre)').order('created_at',{ascending:false});
  const pend = (data||[]).filter(s=>!s.fecha_paso4).length;

function filtrarAct() {
  const q = (document.getElementById('bus-act')?.value||'').toLowerCase();

  renderActList(fil);
}

function renderActList(data) {
  const el = document.getElementById('act-list');
  if (!el) return;
  if (!data.length) { el.innerHTML='<p style="color:var(--gray-400);text-align:center;padding:20px">Sin solicitudes</p>'; return; }
  el.innerHTML = data.map(a => {
    const dias = a.dias_sla??Math.round((new Date()-new Date(a.created_at))/864e5);
    const done = [a.fecha_paso1,a.fecha_paso2,a.fecha_paso3,a.fecha_paso4].filter(Boolean).length;
    const entregado = !!a.fecha_paso4;
    const fuera = !entregado && dias>(a.sla_target_dias||3);
    const pasos = [
      {n:1,lbl:'Solicitud',fecha:a.fecha_paso1,col:'#1A56DB'},
      {n:2,lbl:'Notifica área',fecha:a.fecha_paso2,col:'#F59E0B'},
      {n:3,lbl:'Área → Inspector',fecha:a.fecha_paso3,col:'#0F6E56'},

    ];

          '<div style="font-size:9px;font-weight:500;color:var(--gray-600);margin-top:5px;text-align:center;line-height:1.3;max-width:65px">'+p.lbl+'</div>' +
          '<div style="font-size:9px;color:var(--gray-400);margin-top:2px;text-align:center">'+(p.fecha||'—')+'</div>' +
          (p.n===3&&a.base_nombre?'<div style="font-size:8px;color:var(--blue)">'+a.base_nombre+'</div>':'') +
        '</div>'
      ).join('')+
    '</div>';
    const tagHtml = entregado ? badge(dias+'d en SLA','ok') : fuera ? badge('⚠ '+dias+'d urgente','danger') : badge(dias+'d en curso','warn');
    return '<div style="border:1.5px solid '+(fuera?'#FCA5A5':entregado?'#6EE7B7':'var(--gray-200)')+';border-radius:10px;padding:12px;margin-bottom:9px">' +
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">' +
        '<div><div style="font-size:13px;font-weight:700">'+(a.conductores?.nombre||'—')+' <span style="font-size:10px;font-weight:400;color:var(--gray-400)">'+(a.conductores?.codigo||'—')+'</span></div>' +
        '<div style="font-size:11px;color:var(--gray-600);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">'+badge(a.conductores?.flotas?.nombre||'—','info')+'<strong>'+a.activo+'</strong>'+(Array.isArray(a.subpartes)&&a.subpartes.length?' · <span style="color:var(--gray-400)">'+a.subpartes.join(', ')+'</span>':'')+'</div></div>' +
        '<div style="display:flex;gap:7px;align-items:center">'+tagHtml+'<button class="btn btn-sm" onclick="actualizarActivo(\''+a.id+'\')"><i class="ti ti-edit"></i> Actualizar</button></div>' +
      '</div>'+stepsHtml+'</div>';
  }).join('');
}

        '<label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer"><input type="checkbox" id="fa-cred" style="accent-color:var(--blue)"> Credencial</label>' +

let _faCondId = null;
async function buscarCondAct() {
  const v = document.getElementById('fa-cod').value.trim().toUpperCase();
  if (v.length < 2) return;
  const {data} = await sb.from('conductores').select('id,nombre,vehiculo,placa,flotas(nombre)').eq('codigo',v).single();
  if (data) {
    _faCondId = data.id;
    document.getElementById('fa-nm').value = data.nombre;
    document.getElementById('fa-fl').value = data.flotas?.nombre||'—';
    document.getElementById('fa-vh').value = (data.vehiculo||'—')+(data.placa?' · '+data.placa:'');
  }
}

function toggleSubsAct() {
  const v = document.getElementById('fa-activo').value;
  document.getElementById('fa-subs-foto').style.display = v==='Fotocheck'?'block':'none';
  document.getElementById('fa-subs-kit').style.display = v==='Kit identificación'?'block':'none';
}

async function guardarActivo() {
  if (!_faCondId) { alert('Ingresa un código válido'); return; }
  const activo = document.getElementById('fa-activo').value;
  if (!activo) { alert('Selecciona el activo'); return; }
  let subs = [];
  if (activo==='Fotocheck') {
    if (document.getElementById('fa-lanyard').checked) subs.push('Lanyard');
    if (document.getElementById('fa-acrilico').checked) subs.push('Acrílico');
    if (document.getElementById('fa-pvc').checked) subs.push('Tarjeta PVC');
  } else if (activo==='Kit identificación') {
    if (document.getElementById('fa-cab').checked) subs.push('Cabecera');
    if (document.getElementById('fa-cred').checked) subs.push('Credencial');
  }
  const sla = activo==='Corbata'||activo==='Cable cargador'?2:activo==='Charging spot'?4:3;
  const {error} = await sb.from('solicitudes_activos').insert({
    conductor_id:_faCondId, inspector_id:CU.id, activo, subpartes:subs,
    motivo:document.getElementById('fa-motivo').value,
    observacion:document.getElementById('fa-obs').value,
    origen:'autonoma', sla_target_dias:sla, fecha_paso1:new Date().toISOString().slice(0,10)
  });
  if (error) { alert('Error: '+error.message); return; }
  document.getElementById('fa-ok').style.display = 'block';
  _faCondId = null;
  setTimeout(() => { closeModal(); renderActivos(); }, 1500);
}

async function actualizarActivo(id) {
  const {data:sol} = await sb.from('solicitudes_activos').select('*').eq('id',id).single();
  if (!sol) return;
  openModal('upd-act','Actualizar pasos — '+sol.activo,
    [1,2,3,4].map(n => {
      const key = 'fecha_paso'+n;
      const lbls = ['','Conductor solicita','Inspector notifica área','Área entrega a inspector'+( n===3?'<br><small>(Base donde está el activo)</small>':''),'Inspector entrega a conductor'];
      const cols = ['','#1A56DB','#F59E0B','#0F6E56','#7C3AED'];
      return '<div style="background:var(--gray-50);border:1px solid var(--gray-200);border-radius:8px;padding:11px;margin-bottom:9px">' +
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">' +
          '<div style="width:24px;height:24px;border-radius:50%;background:'+cols[n]+';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff">'+n+'</div>' +
          '<div style="font-size:11px;font-weight:700">'+lbls[n]+'</div>' +
          (sol[key]?'<span style="font-size:10px;color:var(--green);font-weight:600">✓ '+sol[key]+'</span>':'') +
        '</div>' +
        '<input type="date" id="upd-p'+n+'" value="'+(sol[key]||'')+'" style="margin-bottom:'+(n===3?'8':'0')+'px">' +
        (n===3?'<select id="upd-base" style="margin-top:6px"><option value="">Seleccionar base...</option><option value="Oficina Miraflores"'+(sol.base_nombre==='Oficina Miraflores'?' selected':'')+'>Oficina Miraflores</option><option value="Aeropuerto"'+(sol.base_nombre==='Aeropuerto'?' selected':'')+'>Aeropuerto</option></select>':'') +
      '</div>';
    }).join('') +
    '<button class="btn btn-primary" onclick="guardarPasos(\''+id+'\')"><i class="ti ti-check"></i> Guardar cambios</button>'
  );
}

async function guardarPasos(id) {
  const p1=document.getElementById('upd-p1')?.value;
  const p2=document.getElementById('upd-p2')?.value;
  const p3=document.getElementById('upd-p3')?.value;
  const p4=document.getElementById('upd-p4')?.value;
  const base=document.getElementById('upd-base')?.value;
  const upd={};
  if(p1)upd.fecha_paso1=p1;if(p2)upd.fecha_paso2=p2;if(p3)upd.fecha_paso3=p3;if(p4)upd.fecha_paso4=p4;if(base)upd.base_nombre=base;
  if(p1&&p4)upd.dias_sla=Math.round((new Date(p4)-new Date(p1))/864e5);
  await sb.from('solicitudes_activos').update(upd).eq('id',id);
  closeModal(); renderActivos();
}

async function exportarActivos() {
  const {data} = await sb.from('solicitudes_activos').select('*,conductores(codigo,nombre,flotas(nombre)),usuarios(nombre)').order('created_at',{ascending:false});
  if (!data?.length) { alert('Sin datos para exportar'); return; }
  const pendientes = data.filter(a => a.fecha_paso1 && !a.fecha_paso2);
  if (!pendientes.length) { alert('No hay activos pendientes de notificar al área'); return; }
  try {
    const wb = new ExcelJS.Workbook();
    const ws = wb.addWorksheet('Activos pendientes');
    ws.addRow(['Conductor','Codigo','Flota','Activo','Subpartes','Inspector','Fecha solicitud','Dias pendiente','Estado']);
    pendientes.forEach(a => {
      ws.addRow([
        String(a.conductores?.nombre||''),
        String(a.conductores?.codigo||''),
        String(a.conductores?.flotas?.nombre||''),
        String(a.activo||''),
        String(Array.isArray(a.subpartes)?a.subpartes.join(', '):(a.subpartes||'')),
        String(a.usuarios?.nombre||''),
        String(a.fecha_paso1||''),
        String(Math.round((new Date()-new Date(a.created_at))/864e5)),
        'Pendiente notificar area'
      ]);
    });
    const buf = await wb.xlsx.writeBuffer();
    const blob = new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download='activos_pendientes_'+new Date().toISOString().slice(0,10)+'.xlsx'; a.click();
    URL.revokeObjectURL(url);
  } catch(e) { alert('Error: '+e.message); }
}
</script>

// ─── CONSTRUCTOR DE FORMULARIOS ───────────
async function renderConstructor() {
  const {data:campos} = await sb.from('formulario_campos').select('*').order('formulario').order('orden');
  const porForm = {inspeccion:[],compromisos:[],incidencias:[],activos:[]};
  (campos||[]).forEach(c => { if(porForm[c.formulario]) porForm[c.formulario].push(c); });
  const formLabels = {inspeccion:'Inspección',compromisos:'Compromisos',incidencias:'Incidencias',activos:'Activos'};
  document.getElementById('main-content').innerHTML =
    '<h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Constructor de formularios</h2>' +
    '<div class="alert alert-info"><div class="at"><i class="ti ti-info-circle"></i> Gestiona los campos editables de cada formulario. Los campos fijos (conductor, placa, vehículo) no aparecen aquí.</div></div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">' +
      Object.entries(porForm).map(([form,items]) =>
        '<div class="card" style="margin-bottom:0">' +
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">' +
            '<div class="card-title" style="margin-bottom:0">'+formLabels[form]+'</div>' +
            '<button class="btn btn-primary btn-sm" onclick="agregarCampo(\''+form+'\')"><i class="ti ti-plus"></i> Agregar</button>' +
          '</div>' +
          (!items.length ? '<p style="color:var(--gray-400);font-size:12px;text-align:center;padding:12px">Sin campos configurados</p>' :
            items.map(c =>
              '<div style="padding:9px 0;border-bottom:1px solid var(--gray-100)">' +
                '<div style="display:flex;align-items:center;gap:8px">' +
                  '<div style="flex:1">' +
                    '<div style="font-size:12px;font-weight:600">'+c.nombre+(c.obligatorio?'<span style="color:var(--red);font-size:10px;margin-left:2px">*</span>':'')+'</div>' +
                    '<div style="font-size:10px;color:var(--gray-400)">'+c.tipo+' · '+(c.seccion||'—')+'</div>' +
                    (c.opciones?.length?'<div style="font-size:10px;color:var(--blue);margin-top:2px">'+c.opciones.join(' · ')+'</div>':'') +
                  '</div>' +
                  badge(c.activo?'Activo':'Inactivo',c.activo?'ok':'gray') +
                  (c.opciones?.length?'<button class="btn btn-sm edit-opts" data-cid="'+c.id+'" title="Editar opciones"><i class="ti ti-list"></i></button>':'') +
                  '<button class="btn btn-sm" onclick="toggleCampo(\''+c.id+'\','+(!c.activo)+')" title="'+(c.activo?'Desactivar':'Activar')+'"><i class="ti ti-'+(c.activo?'eye-off':'eye')+'"></i></button>' +
                '</div>' +
              '</div>'
            ).join('')
          ) +
        '</div>'
      ).join('') +
    '</div>';
}

async function agregarCampo(formulario) {
  const nombre = prompt('Nombre del campo:'); if(!nombre) return;
  const tipoNum = prompt('Tipo:\n1 = Escala 1-5\n2 = Sí / No\n3 = Texto libre\n4 = Lista de opciones (una respuesta)\n5 = Multi-opción (varias respuestas)','2');
  const tipoMap = {'1':'escala','2':'sino','3':'texto','4':'opciones','5':'multiopciones'};
  const tipo = tipoMap[tipoNum]||'sino';
  const seccion = prompt('Sección (ej: Vehículo, Conductor):','General');
  const oblig = confirm('¿Es obligatorio?');
  let opciones = null;
  if (tipo==='opciones'||tipo==='multiopciones') {
    const str = prompt('Escribe las opciones separadas por coma:\nEj: Opción A, Opción B, Opción C');
    if (str) opciones = str.split(',').map(o=>o.trim()).filter(Boolean);
  }
  const {error} = await sb.from('formulario_campos').insert({formulario,nombre,tipo,opciones:opciones||null,seccion,obligatorio:oblig,activo:true,orden:999});
  if(error){alert('Error: '+error.message);return;}
  renderConstructor();
}

async function editarOpcionesById(id) {
  const {data:campo} = await sb.from('formulario_campos').select('nombre,opciones').eq('id',id).single();
  if (!campo) return;
  const actual = (campo.opciones||[]).join(', ');
  const nuevo = prompt('Editar opciones de "'+campo.nombre+'"\nSepara con comas:\n',actual);
  if (nuevo===null) return;
  const opciones = nuevo.split(',').map(o=>o.trim()).filter(Boolean);
  await sb.from('formulario_campos').update({opciones}).eq('id',id);
  renderConstructor();
}
async function editarOpciones(id, opcionesActuales) {
  const actual = (opcionesActuales||[]).join(', ');
  const nuevo = prompt('Editar opciones (separa con comas):',actual);
  if (nuevo===null) return;
  const opciones = nuevo.split(',').map(o=>o.trim()).filter(Boolean);
  await sb.from('formulario_campos').update({opciones}).eq('id',id);
  renderConstructor();
}

async function toggleCampo(id, activo) {
  await sb.from('formulario_campos').update({activo}).eq('id',id);
  renderConstructor();
}

// ─── GESTIÓN PADRÓN ───────────────────────
async function renderPadron() {
  const {data:conds,count} = await sb.from('conductores').select('codigo,nombre,placa,vehiculo,estado,categoria,flotas(nombre)',{count:'exact'}).neq('estado','desactivado').order('nombre').limit(20);
  document.getElementById('main-content').innerHTML =
    '<h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Gestión de padrón</h2>' +
    '<div class="card" style="max-width:540px">' +
      '<div class="card-title">Subir nuevo padrón (CSV o XLSX)</div>' +
      '<input type="file" id="padron-file" accept=".csv,.xlsx,.xls" onchange="procesarPadron()" style="margin-bottom:10px">' +
      '<div id="padron-preview"></div>' +
    '</div>' +
    '<div class="card">' +
      '<div class="card-title">Conductores activos ('+(count||0)+')</div>' +
      '<table><thead><tr><th>Código</th><th>Conductor</th><th>Flota</th><th>Vehículo · Placa</th><th>Categoría</th><th>Estado</th></tr></thead>' +
      '<tbody>'+(conds||[]).map(c=>'<tr><td style="font-family:monospace;font-size:10px">'+c.codigo+'</td><td style="font-weight:600">'+c.nombre+'</td><td>'+badge(c.flotas?.nombre||'—','info')+'</td><td style="font-size:11px;color:var(--gray-600)">'+(c.vehiculo||'—')+(c.placa?' · '+c.placa:'')+'</td><td>'+badge(c.categoria||'—','gray')+'</td><td>'+badge(c.estado,c.estado==='activo'?'ok':'warn')+'</td></tr>').join('')+'</tbody></table>' +
      (count>20?'<p style="font-size:11px;color:var(--gray-400);margin-top:8px">Mostrando 20 de '+count+'. Usa "Reportes y filtros" para ver todos.</p>':'') +
    '</div>';
}

async function procesarPadron() {
  const file = document.getElementById('padron-file').files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    const text = e.target.result;
    const lines = text.split('\n').filter(l=>l.trim());
    if (!lines.length) return;
    const headers = lines[0].split(',').map(h=>h.trim().toLowerCase());
    const rows = lines.slice(1).map(l => {
      const cols = l.split(',').map(c=>c.trim().replace(/^"|"$/g,''));
      const obj = {};
      headers.forEach((h,i)=>obj[h]=cols[i]||'');
      return {
        codigo: obj.codigo||obj['código']||obj.cod||'',
        nombre: obj.nombre||obj.conductor||'',
        placa: obj.placa||'',
        vehiculo: obj.vehiculo||obj.auto||obj.carro||'',
        flota: obj.flota||'',
        estado: obj.estado||'activo',
        categoria: obj.categoria||obj['categoría']||''
      };
    }).filter(r=>r.codigo&&r.nombre);
    // Store rows in window variable to avoid inline JSON issues
    window._padronRows = rows;
    document.getElementById('padron-preview').innerHTML =
      '<div class="alert alert-info"><div class="at"><i class="ti ti-file-check"></i> '+rows.length+' conductores detectados</div></div>' +
      '<div style="display:flex;gap:8px"><button class="btn btn-primary" onclick="subirPadron(window._padronRows)"><i class="ti ti-upload"></i> Confirmar carga ('+rows.length+')</button>' +
      '<button class="btn" onclick="renderPadron()">Cancelar</button></div>';
  };
  reader.readAsText(file,'UTF-8');
}

async function subirPadron(rows) {
  const {data:flotas} = await sb.from('flotas').select('id,nombre');
  // Check for placa conflicts
  const placas = rows.map(r=>r.placa).filter(Boolean);
  if (placas.length) {
    const {data:conflicts} = await sb.from('compromisos').select('placa_vehiculo,conductores(nombre,codigo,estado)').in('placa_vehiculo',placas).eq('estado','pendiente');
    const confByPlaca = {};
    (conflicts||[]).forEach(c=>{if(c.conductores?.estado==='desactivado'){if(!confByPlaca[c.placa_vehiculo])confByPlaca[c.placa_vehiculo]=[];confByPlaca[c.placa_vehiculo].push(c.conductores?.nombre);}});
    if (Object.keys(confByPlaca).length) {
      let msg = '⚠ Placas con compromisos pendientes de conductores anteriores:\n\n';
      Object.entries(confByPlaca).forEach(([pl,nms])=>{msg+=pl+': '+nms.join(', ')+'\n';});
      msg += '\n¿Continuar con la carga?';
      if (!confirm(msg)) return;
    }
  }
  let ok=0,err=0;
  for (const r of rows) {
    const flota = flotas?.find(f=>f.nombre.toLowerCase().includes((r.flota||'').toLowerCase()));
    const {error} = await sb.from('conductores').upsert({
      codigo:r.codigo.toUpperCase(),nombre:r.nombre,vehiculo:r.vehiculo||null,
      placa:r.placa||null,flota_id:flota?.id||null,estado:r.estado||'activo',
      categoria:r.categoria||null
    },{onConflict:'codigo'});
    error?err++:ok++;
  }
  document.getElementById('padron-preview').innerHTML = '<div class="alert alert-success"><div class="at">✓ '+ok+' conductores procesados'+(err?' · ⚠ '+err+' errores':'')+'</div></div>';
  setTimeout(()=>renderPadron(),1500);
}

    '<div class="card" style="max-width:560px">' +
      '<div class="card-title">Crear nuevo usuario</div>' +
      '<div class="form-grid">' +
        '<div class="form-field"><label class="form-label2">Nombre completo</label><input type="text" id="nu-nm" placeholder="Nombre Apellido"></div>' +
        '<div class="form-field"><label class="form-label2">Email</label><input type="email" id="nu-em" placeholder="usuario@directoapp.pe"></div>' +
      '</div>' +
      '<div class="form-grid">' +
        '<div class="form-field"><label class="form-label2">Rol</label><select id="nu-rol"><option value="inspector">Inspector</option><option value="ejecutivo">Ejecutivo</option><option value="admin">Admin</option></select></div>' +
        '<div class="form-field"><label class="form-label2">Teléfono</label><input type="text" id="nu-tel" placeholder="9XXXXXXXX"></div>' +
      '</div>' +
      '<div class="form-field" style="margin-bottom:10px"><label class="form-label2">Contraseña temporal</label><input type="password" id="nu-pass" placeholder="Mínimo 8 caracteres"></div>' +
      '<button class="btn btn-primary" onclick="crearUsuario()"><i class="ti ti-user-plus"></i> Crear usuario</button>' +
      '<div id="nu-msg" style="margin-top:10px"></div>' +
    '</div>' +
    '<div class="card"><div class="card-title">Usuarios del sistema</div>' +
      '<table><thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Teléfono</th><th>Estado</th></tr></thead>' +
      '<tbody>'+(users||[]).map(u=>
        '<tr><td style="font-weight:600">'+u.nombre+'</td><td style="font-size:11px;color:var(--gray-400)">'+u.email+'</td><td>'+badge(u.rol,u.rol==='admin'?'danger':u.rol==='inspector'?'info':'warn')+'</td><td style="font-size:11px">'+(u.telefono||'—')+'</td><td>'+badge(u.activo!==false?'Activo':'Inactivo',u.activo!==false?'ok':'gray')+'</td></tr>'
      ).join('')+'</tbody></table>' +
    '</div>';
}

async function crearUsuario() {
  const nm=document.getElementById('nu-nm').value.trim();
  const em=document.getElementById('nu-em').value.trim();
  const pass=document.getElementById('nu-pass').value;
  const rol=document.getElementById('nu-rol').value;
  const tel=document.getElementById('nu-tel').value.trim();
  const msg=document.getElementById('nu-msg');
  if(!nm||!em||!pass){msg.innerHTML='<span style="color:var(--red);font-size:12px">Completa nombre, email y contraseña</span>';return;}
  msg.innerHTML='<span style="color:var(--blue);font-size:12px">Creando usuario...</span>';
  const {data,error}=await sb.auth.signUp({email:em,password:pass,options:{data:{nombre:nm,rol}}});
  if(error){msg.innerHTML='<div class="alert alert-danger"><div class="at">'+error.message+'</div></div>';return;}
  if(data?.user){
    await sb.from('usuarios').insert({id:data.user.id,nombre:nm,email:em,rol,telefono:tel||null,activo:true});
    msg.innerHTML='<div class="alert alert-success"><div class="at">✓ Usuario '+nm+' creado. Si el email no se confirma automáticamente, ve a Supabase → Auth → Users → confirmar manualmente.</div></div>';
    setTimeout(()=>renderUsuarios(),2000);
  }
}

// ─── INIT ─────────────────────────────────
sb.auth.onAuthStateChange(async (event, session) => {
  if (event==='SIGNED_OUT') {
    document.getElementById('app').style.display='none';
    document.getElementById('login-page').style.display='flex';
  }
});
</script>

<script>
// Event delegation for dynamically created buttons
document.addEventListener('click', async function(e) {
  const editBtn = e.target.closest('.edit-opts');
  if (editBtn) {
    const id = editBtn.getAttribute('data-cid');
    if (id) await editarOpcionesById(id);
  }
});
</script>
